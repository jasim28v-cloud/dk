<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHΔDØW | THE ULTIMATE TITAN 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Cairo:wght@300;900&display=swap');
        
        :root { --primary: #00f3ff; --bg: #020202; }
        body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; overflow-x: hidden; }

        .hero-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #0a0f1a 0%, #000 100%); }
        
        .titan-grid { display: grid; grid-template-columns: 80px 300px 1fr 300px; height: 100vh; }

        @media (max-width: 1100px) {
            .titan-grid { grid-template-columns: 1fr; height: auto; display: flex; flex-direction: column; }
            .glass-sidebar { flex-direction: row !important; width: 100%; height: 60px !important; padding: 0 15px !important; position: sticky; top: 0; z-index: 1000; background: rgba(0,0,0,0.9); }
            .logo-vertical { writing-mode: horizontal-tb !important; margin: 0 !important; font-size: 14px !important; }
            .glass-panel { display: none; } /* إخفاء القوائم الجانبية على الموبايل لتركيز المساحة للفيديو */
        }

        .glass-sidebar { background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border-left: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; align-items: center; padding: 30px 0; }
        .main-display { padding: 20px; overflow-y: auto; scrollbar-width: none; height: 100vh; }

        /* مشغل فيديو تيك توك ستايل */
        .video-container { 
            position: relative; 
            width: 100%; 
            max-width: 400px; 
            margin: 0 auto 30px; 
            aspect-ratio: 9/16; 
            background: #000; 
            border-radius: 20px; 
            overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        video { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }

        .watermark { position: absolute; top: 15px; right: 15px; font-family: 'Orbitron'; font-size: 10px; color: rgba(255,255,255,0.5); z-index: 10; pointer-events: none; }

        /* أزرار التفاعل الجانبية */
        .side-actions { position: absolute; right: 10px; bottom: 100px; display: flex; flex-direction: column; gap: 15px; z-index: 20; }
        .action-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.3s; }
        .action-item i { font-size: 24px; filter: drop-shadow(0 0 5px rgba(0,0,0,0.8)); }
        .action-item span { font-size: 11px; font-weight: bold; margin-top: 4px; text-shadow: 0 1px 3px #000; }
        .action-item:hover { color: var(--primary); transform: scale(1.1); }

        /* معلومات الفيديو */
        .video-meta { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); z-index: 15; }
        .user-tag { font-weight: 900; color: var(--primary); font-size: 14px; margin-bottom: 5px; }

        /* زر كتم الصوت */
        .mute-toggle { position: absolute; top: 15px; left: 15px; z-index: 20; background: rgba(0,0,0,0.5); padding: 8px; border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; }

        .upload-btn { background: linear-gradient(45deg, var(--primary), #0077ff); color: #000; font-weight: 900; padding: 12px 25px; border-radius: 50px; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

    <div class="hero-bg"></div>

    <div class="titan-grid">
        <aside class="glass-sidebar">
            <div class="logo-vertical mb-10">SHΔDØW</div>
            <div class="flex flex-col gap-6">
                <div class="p-3 hover:text-cyan-400 cursor-pointer"><i class="fas fa-home text-xl"></i></div>
                <div class="p-3 hover:text-red-500 cursor-pointer"><i class="fas fa-bolt text-xl"></i></div>
                <div id="mega-upload" class="p-3 bg-cyan-500 text-black rounded-full cursor-pointer"><i class="fas fa-plus text-xl"></i></div>
            </div>
        </aside>

        <section class="hidden lg:flex flex-col p-6 bg-black/20 backdrop-blur-md border-r border-white/5">
            <h3 class="text-[10px] font-[Orbitron] opacity-50 mb-4 tracking-widest uppercase">System Status</h3>
            <div class="bg-white/5 p-4 rounded-xl border border-white/10 flex items-center gap-3 mb-8">
                <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                <span class="text-xs font-bold">TITAN_NODE_ACTIVE</span>
            </div>
            
            <h3 class="text-[10px] font-[Orbitron] opacity-50 mb-4 uppercase">Live Chat</h3>
            <div id="mini-chat" class="flex-1 overflow-y-auto space-y-3 text-[11px] opacity-70 mb-4"></div>
            <input id="chat-in" type="text" placeholder="اكتب شيئاً..." class="bg-white/5 border border-white/10 p-3 rounded-lg outline-none text-xs focus:border-cyan-500">
        </section>

        <main class="main-display" id="main-scroller">
            <div id="video-feed" class="flex flex-col items-center">
                </div>
        </main>

        <section class="hidden xl:flex flex-col p-6 bg-black/20 backdrop-blur-md">
            <h3 class="text-[10px] font-[Orbitron] opacity-50 mb-4 uppercase">Statistics</h3>
            <div class="space-y-4">
                <div class="p-4 bg-white/5 rounded-xl border border-white/5">
                    <div class="text-[10px] opacity-40 uppercase">Global Users</div>
                    <div class="text-xl font-black text-cyan-400">1.2M</div>
                </div>
            </div>
        </section>
    </div>

    <script>
        const SHADOW_ID = localStorage.getItem('shadow_uid') || 'TITAN_' + Math.random().toString(36).substr(2, 4).toUpperCase();
        localStorage.setItem('shadow_uid', SHADOW_ID);

        const firebaseConfig = { databaseURL: "https://project-717e4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const AD_LINKS = [
            "https://www.effectivegatecpm.com/k60w64w4gk?key=564f3d8cc4ac85949f218179b742495e",
            "https://www.effectivegatecpm.com/bxwxuk2f39?key=566216691dc8b76a740840e94f68f44c"
        ];
        function callAd() { window.open(AD_LINKS[Math.floor(Math.random()*AD_LINKS.length)], '_blank'); }

        // الرفع
        const myWidget = cloudinary.createUploadWidget({ cloudName: "dssk5tabb", uploadPreset: "bjebvo5p" }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('videos/').push({ url: res.info.secure_url, sender: SHADOW_ID, likes: 0, shares: 0, timestamp: Date.now() });
            }
        });
        document.getElementById("mega-upload").onclick = () => myWidget.open();

        // عرض الفيديوهات
        db.ref('videos').on('value', snap => {
            const feed = document.getElementById('video-feed');
            const data = snap.val();
            feed.innerHTML = '';
            if(!data) return;

            Object.keys(data).reverse().forEach(id => {
                const v = data[id];
                const card = document.createElement('div');
                card.className = 'video-container';
                card.innerHTML = `
                    <div class="watermark">SHΔDØW</div>
                    <div class="mute-toggle" onclick="toggleMute(this)"><i class="fas fa-volume-up"></i></div>
                    <video loop playsinline src="${v.url}" onclick="togglePlay(this)"></video>
                    
                    <div class="side-actions">
                        <div class="action-item" onclick="handleLike('${id}')">
                            <i class="fas fa-heart text-red-500"></i>
                            <span>${v.likes || 0}</span>
                        </div>
                        <div class="action-item" onclick="handleShare('${id}')">
                            <i class="fas fa-share text-cyan-400"></i>
                            <span>${v.shares || 0}</span>
                        </div>
                        <div class="action-item">
                            <i class="fas fa-comment text-white"></i>
                            <span>0</span>
                        </div>
                    </div>

                    <div class="video-meta">
                        <div class="user-tag">@${v.sender}</div>
                        <div class="text-[10px] opacity-60">Titan Secure Stream v9.2</div>
                    </div>
                `;
                feed.appendChild(card);
            });
            observeVideos();
        });

        // وظائف المشغل
        function togglePlay(vid) { vid.paused ? vid.play() : vid.pause(); }
        
        function toggleMute(btn) {
            const vid = btn.nextElementSibling;
            vid.muted = !vid.muted;
            btn.innerHTML = vid.muted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
        }

        function handleLike(id) { callAd(); db.ref(`videos/${id}`).transaction(p => { if(p) p.likes++; return p; }); }
        function handleShare(id) { callAd(); db.ref(`videos/${id}`).transaction(p => { if(p) p.shares++; return p; }); alert('تم نسخ الرابط!'); }

        // نظام التشغيل التلقائي عند التمرير
        function observeVideos() {
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    const vid = entry.target.querySelector('video');
                    if (entry.isIntersecting) {
                        vid.play().catch(() => {});
                    } else {
                        vid.pause();
                    }
                });
            }, { threshold: 0.8 });

            document.querySelectorAll('.video-container').forEach(c => observer.observe(c));
        }

        // الدردشة
        document.getElementById('chat-in').onkeydown = e => {
            if(e.key === 'Enter' && e.target.value.trim()){
                db.ref('global_chat').push({ user: SHADOW_ID.split('_')[1], text: e.target.value });
                e.target.value = '';
            }
        };

        db.ref('global_chat').limitToLast(10).on('value', s => {
            const chat = document.getElementById('mini-chat');
            chat.innerHTML = '';
            if(s.val()) Object.values(s.val()).forEach(m => {
                chat.innerHTML += `<div class="p-2 bg-white/5 rounded"><b>${m.user}:</b> ${m.text}</div>`;
            });
            chat.scrollTop = chat.scrollHeight;
        });
    </script>
</body>
</html>
