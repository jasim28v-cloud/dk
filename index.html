<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XRAWS | Crimson Glass Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Cairo:wght@400;700;900&display=swap');
        
        body, html { 
            margin: 0; padding: 0; height: 100%; overflow: hidden; 
            background: #4a0404; /* أحمر داكن جداً خلفية */
            font-family: 'Cairo', sans-serif;
        }

        .feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }

        .video-item { 
            height: 100vh; width: 100%; scroll-snap-align: start; 
            position: relative; display: flex; align-items: center; justify-content: center;
        }

        video { height: 100%; width: 100%; object-fit: cover; }

        /* الأزرار الجانبية الزجاجية الحمراء */
        .side-bar {
            position: absolute; right: 15px; bottom: 120px;
            display: flex; flex-direction: column; gap: 18px; z-index: 100;
        }

        .glass-btn {
            background: rgba(255, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 55px; height: 55px; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
        }

        .glass-btn:active { transform: scale(0.9); background: rgba(255, 0, 0, 0.5); }
        .glass-btn i { font-size: 24px; }
        .glass-btn span { font-size: 10px; font-weight: bold; margin-top: 2px; }

        /* معلومات الفيديو الزجاجية */
        .video-info {
            position: absolute; left: 15px; bottom: 30px; right: 80px;
            background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(8px);
            padding: 15px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; z-index: 100;
        }

        .user-tag { font-family: 'Orbitron'; color: #ff4d4d; font-weight: 900; font-size: 18px; }

        /* الشريط السفلي الزجاجي */
        .nav-glass {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: rgba(139, 0, 0, 0.2); backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; justify-content: space-around; align-items: center; z-index: 200;
        }

        .plus-main {
            background: linear-gradient(45deg, #ff0000, #8b0000);
            width: 50px; height: 50px; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 24px; box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
        }

        /* نافذة التعليقات */
        .comments-panel {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 60%;
            background: rgba(20, 0, 0, 0.95); backdrop-filter: blur(20px);
            border-radius: 30px 30px 0 0; z-index: 1000; transition: 0.5s;
            padding: 20px; color: white;
        }
    </style>
</head>
<body>

    <div class="feed" id="video-feed"></div>

    <div class="nav-glass">
        <div class="text-white flex flex-col items-center"><i class="fas fa-home text-xl"></i><span class="text-[10px]">الرئيسية</span></div>
        <div class="plus-main" onclick="widget.open()"><i class="fas fa-plus"></i></div>
        <div class="text-white flex flex-col items-center" onclick="alert('قريباً الملف الشخصي')"><i class="fas fa-user text-xl text-red-500"></i><span class="text-[10px]">حسابي</span></div>
    </div>

    <div id="comment-box" class="comments-panel">
        <div class="flex justify-between mb-4"><span>التعليقات</span><i class="fas fa-times" onclick="closeComments()"></i></div>
        <div class="opacity-50 text-center mt-10">لا توجد تعليقات بعد.. كن الأول!</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD93aEghXrgkTYRKnQ98rVe1Fu9NdngcxY",
            authDomain: "soko-7d03e.firebaseapp.com",
            databaseURL: "https://soko-7d03e-default-rtdb.firebaseio.com",
            projectId: "soko-7d03e",
            storageBucket: "soko-7d03e.firebasestorage.app",
            messagingSenderId: "636395398521",
            appId: "1:636395398521:web:fbd094bd35a2883fda3ba8"
        };

        const ADMIN = "jasim300v@gmail.com";
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // أداة الرفع
        const widget = cloudinary.createUploadWidget({cloudName: "dfscughol", uploadPreset: "update_vk"}, (err, res) => {
            if (res.event === "success") {
                db.ref('posts').push({ 
                    url: res.info.secure_url, 
                    user: auth.currentUser ? auth.currentUser.email : "Zair_XRAWS", 
                    likes: 0, time: Date.now() 
                });
            }
        });

        // الأزرار الحقيقية
        function doLike(id, current) { db.ref('posts/'+id).update({ likes: (current || 0) + 1 }); }
        function openComments() { document.getElementById('comment-box').style.bottom = '0'; }
        function closeComments() { document.getElementById('comment-box').style.bottom = '-100%'; }
        function doShare(url) { navigator.clipboard.writeText(url); alert("تم نسخ رابط الفيديو! 🔗"); }

        db.ref('posts').on('value', snap => {
            const feed = document.getElementById('video-feed');
            feed.innerHTML = '';
            snap.forEach(child => {
                const p = child.val();
                const id = child.key;
                const isMe = auth.currentUser && auth.currentUser.email === ADMIN;
                
                feed.innerHTML += `
                    <div class="video-item">
                        <video src="${p.url}" loop playsinline onclick="this.paused ? this.play() : this.pause()"></video>
                        
                        <div class="side-bar">
                            <div class="glass-btn" onclick="doLike('${id}', ${p.likes})">
                                <i class="fas fa-heart text-red-500"></i>
                                <span>${p.likes || 0}</span>
                            </div>
                            <div class="glass-btn" onclick="openComments()">
                                <i class="fas fa-comment-dots"></i>
                                <span>12</span>
                            </div>
                            <div class="glass-btn" onclick="doShare('${p.url}')">
                                <i class="fas fa-share"></i>
                                <span>نشر</span>
                            </div>
                            ${isMe ? `<div class="glass-btn border-red-500" onclick="db.ref('posts/${id}').remove()"><i class="fas fa-trash text-red-500"></i></div>` : ''}
                        </div>

                        <div class="video-info">
                            <span class="user-tag">@${p.user.split('@')[0]} ${p.user === ADMIN ? '⭐' : ''}</span>
                            <p class="text-sm mt-1 opacity-80">مرحباً بك في عالم XRAWS الزجاجي الأحمر 🔥🍒</p>
                        </div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
