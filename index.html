<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RΞD_VØID | ULTRA NEXUS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Cairo:wght@300;700&display=swap');
        
        :root { --neon: #ff0000; --bg: #000000; }

        body { 
            background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; 
            margin: 0; overflow: hidden; perspective: 1000px;
        }

        /* خلفية البلازما المتحركة */
        .plasma-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), #200 0%, #000 50%);
            z-index: -1; transition: 0.1s;
        }

        .scroll-container { 
            height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; 
            scrollbar-width: none;
        }

        .video-card {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            scroll-snap-align: start; position: relative; padding: 15px;
        }

        /* إطار الفيديو المتطور */
        .video-frame {
            width: 100%; height: 85vh; border-radius: 40px; overflow: hidden;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.2), inset 0 0 20px rgba(0,0,0,1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            position: relative; transform: translateZ(20px);
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        /* الأزرار النانوية البارزة */
        .side-dock {
            position: absolute; left: 30px; bottom: 120px;
            display: flex; flex-direction: column; gap: 25px;
        }

        .nano-node {
            width: 60px; height: 60px; background: rgba(15,0,0,0.9);
            border-radius: 20px; border: 1px solid rgba(255,0,0,0.5);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5), -2px -2px 10px rgba(255,0,0,0.1);
            transition: 0.3s; cursor: pointer;
        }

        .nano-node:active { transform: scale(0.9) translateZ(-10px); box-shadow: 0 0 20px var(--neon); }

        /* شريط التحكم السفلي "العائم" */
        .dock-bar {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 400px; height: 75px;
            background: rgba(20, 0, 0, 0.8); backdrop-filter: blur(20px);
            border-radius: 30px; border: 1px solid rgba(255, 0, 0, 0.2);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }

        #upload-trigger {
            width: 65px; height: 65px; background: var(--neon);
            border-radius: 22px; transform: translateY(-20px);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(255,0,0,0.5);
        }

        .admin-trash {
            position: absolute; top: 40px; left: 40px; background: red;
            width: 45px; height: 45px; border-radius: 12px; display: none;
            align-items: center; justify-content: center; z-index: 500;
        }
    </style>
</head>
<body>

    <div class="plasma-bg" id="bg"></div>

    <header class="fixed top-10 left-10 z-[500] pointer-events-none">
        <h1 class="text-5xl font-black font-[Orbitron] text-red-600 tracking-tighter opacity-80">RΞD</h1>
        <div class="h-1 w-20 bg-red-600 mt-2"></div>
    </header>

    <div class="scroll-container" id="main-stack">
        </div>

    <nav class="dock-bar">
        <div class="text-white/40 hover:text-red-600" onclick="location.reload()"><i class="fas fa-grid-2 text-2xl"></i></div>
        <div id="upload-trigger" onclick="openUploader()"><i class="fas fa-plus text-2xl text-white"></i></div>
        <div class="text-white/40 hover:text-red-600" onclick="toggleChat()"><i class="fas fa-ghost text-2xl"></i></div>
    </nav>

    <div onclick="requestAdmin()" style="position:fixed; top:0; right:0; width:80px; height:80px; z-index:2000; cursor:pointer;"></div>

    <script>
        // التفاعل مع الخلفية
        document.addEventListener('mousemove', e => {
            const bg = document.getElementById('bg');
            bg.style.setProperty('--x', (e.clientX / window.innerWidth * 100) + '%');
            bg.style.setProperty('--y', (e.clientY / window.innerHeight * 100) + '%');
        });

        // إعدادات التقنية
        const firebaseConfig = { databaseURL: "https://xkom-a73e4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const UID = localStorage.getItem('v_uid') || 'ID_' + Math.random().toString(36).substr(2, 4).toUpperCase();
        localStorage.setItem('v_uid', UID);

        let isOverlord = false;

        // جلب الفيديوهات بتصميم الـ Cards
        function fetchVideos() {
            db.ref('vox_god').on('value', s => {
                const stack = document.getElementById('main-stack');
                const data = s.val();
                if(!data) return;
                stack.innerHTML = '';
                Object.keys(data).reverse().forEach(id => {
                    const v = data[id];
                    const card = document.createElement('div');
                    card.className = 'video-card';
                    card.innerHTML = `
                        <div class="video-frame">
                            <video loop playsinline src="${v.url}"></video>
                            ${isOverlord ? `<div class="admin-trash" style="display:flex" onclick="deleteVideo('${id}')"><i class="fas fa-trash"></i></div>` : ''}
                        </div>
                        <div class="side-dock">
                            <div class="nano-node" onclick="likeVideo('${id}')">
                                <i class="fas fa-heart ${v.likedBy && v.likedBy[UID] ? 'text-red-600' : ''}"></i>
                                <span class="text-[10px] font-bold mt-1">${v.likes || 0}</span>
                            </div>
                            <div class="nano-node" onclick="toggleChat()"><i class="fas fa-comment-alt"></i></div>
                            <div class="nano-node" onclick="shareVideo()"><i class="fas fa-radiation"></i></div>
                        </div>
                    `;
                    stack.appendChild(card);
                });
                observeVideos();
            });
        }

        // الرفع
        function openUploader() {
            cloudinary.openUploadWidget({
                cloudName: "dqzjfaqg4", uploadPreset: "vox_god", resourceType: "video"
            }, (err, res) => {
                if (!err && res.event === "success") {
                    db.ref('vox_god').push({ url: res.info.secure_url, likes: 0, sender: UID });
                }
            });
        }

        // الإدارة
        let taps = 0;
        function requestAdmin() {
            taps++;
            if(taps >= 5) {
                if(prompt("PASSWORD:") === "vox77") {
                    isOverlord = true;
                    alert("ACCESS GRANTED");
                    fetchVideos();
                }
                taps = 0;
            }
        }

        function deleteVideo(id) { if(confirm("حذف؟")) db.ref(`vox_god/${id}`).remove(); }
        function shareVideo() { navigator.share({url: location.href}); }
        function toggleChat() { alert("نظام المحادثة النانوية قيد الربط..."); }

        function likeVideo(id) {
            window.open("https://www.effectivegatecpm.com/q7bf96ad4p?key=4272e67963ce67f1cfaeb4a56682d6ec", "_blank");
            db.ref(`vox_god/${id}`).transaction(p => {
                if(p) {
                    if(!p.likedBy) p.likedBy = {};
                    if(p.likedBy[UID]) { p.likes--; delete p.likedBy[UID]; }
                    else { p.likes++; p.likedBy[UID] = true; }
                } return p;
            });
        }

        function observeVideos() {
            const obs = new IntersectionObserver(es => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting && v) v.play().catch(()=>{});
                    else if(v) v.pause();
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.video-card').forEach(c => obs.observe(c));
        }

        document.addEventListener('click', () => { document.querySelectorAll('video').forEach(v => v.muted = false); }, { once: true });
        fetchVideos();
    </script>
</body>
</html>
