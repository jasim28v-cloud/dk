<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RΞD_VØID | NEXUS EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Cairo:wght@300;700&display=swap');
        
        :root { 
            --neon: #ff0000; 
            --deep-dark: #010000;
            --nexus-glass: rgba(15, 0, 0, 0.7);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--deep-dark); color: #fff; 
            overflow: hidden; font-family: 'Cairo', sans-serif;
        }

        /* محرك الخلفية النانوي */
        #nexus-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a0000 0%, #000 100%);
            z-index: -1;
        }

        .scroll-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .scroll-engine::-webkit-scrollbar { display: none; }
        
        .video-segment { 
            height: 100vh; width: 100vw; scroll-snap-align: start; 
            position: relative; overflow: hidden;
        }
        
        video { 
            width: 100%; height: 100%; object-fit: cover;
            filter: brightness(0.9) contrast(1.1);
        }

        /* تصميم الأزرار المنشورية */
        .prism-btn {
            width: 65px; height: 65px; border-radius: 20px;
            background: var(--nexus-glass); backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 0, 0, 0.2);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .prism-btn:active { transform: scale(0.85) rotate(-5deg); border-color: var(--neon); }

        .side-dock { 
            position: absolute; left: 20px; bottom: 140px; 
            display: flex; flex-direction: column; gap: 20px; z-index: 100;
        }

        /* زر الرفع الأسطوري */
        #nexus-upload {
            background: linear-gradient(135deg, #ff0000 0%, #440000 100%);
            width: 75px; height: 75px; border-radius: 25px;
            box-shadow: 0 15px 35px rgba(255, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .bottom-nexus-bar {
            position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 480px; height: 85px; 
            background: var(--nexus-glass); backdrop-filter: blur(40px);
            border-radius: 35px; border: 1px solid rgba(255, 0, 0, 0.1);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }

        /* الإدارة */
        .admin-trash {
            position: absolute; top: 30px; left: 30px;
            background: rgba(255,0,0,0.9); padding: 12px; border-radius: 15px;
            display: none; cursor: pointer; z-index: 500;
        }

        #admin-trigger { position: fixed; top: 10px; right: 10px; opacity: 0.05; cursor: pointer; z-index: 2000; }
    </style>
</head>
<body>

    <div id="nexus-bg"></div>
    <div id="admin-trigger" onclick="nexusAdmin()">🔑</div>

    <header class="fixed top-0 w-full z-[500] p-8 flex justify-between items-center pointer-events-none">
        <div class="pointer-events-auto">
            <h1 class="text-4xl font-black font-[Orbitron] text-red-600 tracking-tighter shadow-red-500">NEXUS</h1>
            <span id="core-tag" class="text-[9px] font-[Orbitron] tracking-[0.5em] text-white/30">VOID_STATION_V.FINAL</span>
        </div>
        <div class="prism-btn h-12 w-auto px-4 pointer-events-auto border-none">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 bg-red-600 rounded-full animate-ping"></div>
                <span class="text-[10px] font-bold">LIVE_CORE</span>
            </div>
        </div>
    </header>

    <main class="scroll-engine" id="video-stack">
        </main>

    <nav class="bottom-nexus-bar">
        <div class="prism-btn border-none" onclick="location.reload()"><i class="fa-solid fa-house-user text-xl opacity-40"></i></div>
        <div class="prism-btn border-none" onclick="toggleChat()"><i class="fa-solid fa-satellite-dish text-xl opacity-40"></i></div>
        
        <div id="nexus-upload" class="flex items-center justify-center cursor-pointer active:scale-90 transition-all">
            <i class="fa-solid fa-plus text-3xl text-white"></i>
        </div>

        <div class="prism-btn border-none" onclick="shareVideo()"><i class="fa-solid fa-share-nodes text-xl opacity-40"></i></div>
        <div class="prism-btn border-none" onclick="openAd()"><i class="fa-solid fa-shield-halved text-xl opacity-40"></i></div>
    </nav>

    <div id="chat-overlay" class="fixed inset-0 z-[1500] hidden flex-col bg-black/98 backdrop-blur-3xl">
        <div class="p-10 flex justify-between items-center">
            <h2 class="font-[Orbitron] text-red-600 tracking-widest text-2xl font-black">NEXUS_COMMS</h2>
            <i class="fa-solid fa-circle-chevron-down text-3xl cursor-pointer text-red-600" onclick="toggleChat()"></i>
        </div>
        <div id="chat-box" class="flex-1 p-8 overflow-y-auto"></div>
        <div class="p-8 flex gap-4 bg-white/5">
            <input type="text" id="msg-input" class="flex-1 bg-transparent border-b border-red-900 outline-none p-4 text-white" placeholder="Broadcast signal...">
            <button onclick="sendChat()" class="prism-btn h-14 w-14 border-red-600"><i class="fa-solid fa-paper-plane text-red-600"></i></button>
        </div>
    </div>

    <script>
        // --- NEXUS ENGINE CONFIG ---
        const firebaseConfig = { databaseURL: "https://xkom-a73e4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const UID = localStorage.getItem('v_uid') || 'NX_' + Math.random().toString(36).substr(2, 4).toUpperCase();
        localStorage.setItem('v_uid', UID);

        let isOverlord = false;
        let adminClicks = 0;

        function nexusAdmin() {
            adminClicks++;
            if(adminClicks >= 5) {
                if(prompt("IDENTITY_CHECK:") === "vox77") {
                    isOverlord = true;
                    document.getElementById('core-tag').innerText = "OVERLORD_CONNECTED";
                    document.getElementById('core-tag').classList.add('text-red-600');
                    alert("نظام NEXUS تحت سيطرتك الكاملة.");
                    loadNexus();
                }
                adminClicks = 0;
            }
        }

        // --- تحميل محتوى NEXUS ---
        function loadNexus() {
            db.ref('vox_god').on('value', (s) => {
                const stack = document.getElementById('video-stack');
                const data = s.val();
                if(!data) return;
                stack.innerHTML = '';
                Object.keys(data).reverse().forEach(id => {
                    const v = data[id];
                    const sec = document.createElement('section');
                    sec.className = 'video-segment';
                    sec.innerHTML = `
                        <video loop playsinline src="${v.url}"></video>
                        ${isOverlord ? `<div class="admin-trash flex items-center" onclick="deleteNexus('${id}')"><i class="fa-solid fa-trash-can"></i></div>` : ''}
                        <div class="side-dock">
                            <div class="prism-btn ${v.likedBy && v.likedBy[UID] ? 'text-red-600' : 'text-white/50'}" onclick="likeNexus('${id}')">
                                <i class="fa-solid fa-heart-pulse text-2xl"></i>
                                <span class="text-[10px] font-black mt-1">${v.likes || 0}</span>
                            </div>
                            <div class="prism-btn text-white/50" onclick="toggleChat()"><i class="fa-solid fa-comment-dots text-2xl"></i></div>
                            <div class="prism-btn text-white/50" onclick="shareVideo()"><i class="fa-solid fa-tower-broadcast text-2xl"></i></div>
                        </div>
                    `;
                    stack.appendChild(sec);
                });
                initScroll();
            });
        }

        // الحذف
        function deleteNexus(id) {
            if(confirm("إزالة هذا الملف من الجدول الزمني؟")) db.ref(`vox_god/${id}`).remove();
        }

        // الرفع
        const nexusWidget = cloudinary.createUploadWidget({
            cloudName: "dqzjfaqg4", uploadPreset: "vox_god", resourceType: "video"
        }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('vox_god').push({ url: res.info.secure_url, sender: UID, likes: 0, ts: Date.now() });
            }
        });
        document.getElementById("nexus-upload").onclick = () => nexusWidget.open();

        // التفاعلات
        function likeNexus(id) {
            window.open("https://www.effectivegatecpm.com/q7bf96ad4p?key=4272e67963ce67f1cfaeb4a56682d6ec", '_blank');
            db.ref(`vox_god/${id}`).transaction(p => {
                if(p) {
                    if(!p.likedBy) p.likedBy = {};
                    if(p.likedBy[UID]) { p.likes--; delete p.likedBy[UID]; }
                    else { p.likes++; p.likedBy[UID] = true; }
                }
                return p;
            });
        }

        function toggleChat() { 
            const c = document.getElementById('chat-overlay');
            if(c.classList.contains('hidden')) window.open("https://www.effectivegatecpm.com/w6ejwgptb?key=b77b52a8f4f7e4cdd1ac7bccc1b04a4d", '_blank');
            c.classList.toggle('hidden'); c.classList.toggle('flex');
        }

        function shareVideo() { navigator.share({url: window.location.href}); }

        function sendChat() {
            const i = document.getElementById('msg-input');
            if(i.value.trim()){ db.ref('global_chat').push({user:UID, text:i.value}); i.value=''; }
        }

        db.ref('global_chat').limitToLast(10).on('value', s => {
            const b = document.getElementById('chat-box'); b.innerHTML = '';
            s.forEach(c => {
                const m = c.val();
                const d = document.createElement('div');
                d.className = m.user === UID ? 'mb-8 text-left' : 'mb-8 text-right';
                d.innerHTML = `<span class="text-[9px] text-red-600 font-[Orbitron] block mb-2 opacity-50">${m.user}</span><p class="inline-block p-4 bg-red-950/20 rounded-2xl border border-red-900/20 text-sm">${m.text}</p>`;
                b.appendChild(d);
            });
            b.scrollTop = b.scrollHeight;
        });

        function initScroll() {
            const obs = new IntersectionObserver(es => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting && v) v.play().catch(()=>{});
                    else if(v) v.pause();
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.video-segment').forEach(s => obs.observe(s));
        }

        loadNexus();
        document.addEventListener('click', () => { document.querySelectorAll('video').forEach(v => v.muted = false); }, { once: true });
    </script>
</body>
</html>
