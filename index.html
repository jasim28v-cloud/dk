<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XRAWS | ULTIMATE EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap');
        
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: 'Rajdhani', sans-serif; color: white; }
        
        .cyber-header {
            position: fixed; top: 0; width: 100%; z-index: 2000;
            display: flex; justify-content: space-between; align-items: center;
            padding: 25px; background: linear-gradient(to bottom, rgba(255,0,0,0.2), transparent);
            backdrop-filter: blur(5px);
        }

        .logo { font-family: 'Orbitron'; font-weight: 900; font-size: 28px; color: #ff0000; text-shadow: 0 0 20px #ff0000; letter-spacing: 3px; }

        .join-btn {
            background: linear-gradient(90deg, #ff0000, #4a0000);
            padding: 10px 25px; border-radius: 5px; font-weight: bold;
            text-transform: uppercase; letter-spacing: 2px; border: 1px solid #ff4d4d;
            box-shadow: 0 0 15px #ff0000; transition: 0.3s;
        }

        .join-btn:hover { transform: scale(1.1); box-shadow: 0 0 30px #ff0000; }

        .feed-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .feed-container::-webkit-scrollbar { display: none; }

        .post-card { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; background: #050000; }
        video { height: 100%; width: 100%; object-fit: cover; }

        .side-interface {
            position: absolute; right: 20px; bottom: 120px;
            display: flex; flex-direction: column; gap: 20px; z-index: 100;
        }

        .control-unit {
            background: rgba(255, 0, 0, 0.1); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 0, 0, 0.3); width: 60px; height: 60px;
            border-radius: 12px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: 0.3s;
        }

        .control-unit i { font-size: 22px; color: #ff0000; }
        .control-unit span { font-size: 10px; margin-top: 4px; font-weight: bold; font-family: 'Orbitron'; }

        .video-meta {
            position: absolute; left: 20px; bottom: 100px; right: 100px;
            background: rgba(0,0,0,0.5); border-left: 4px solid #ff0000;
            padding: 15px; border-radius: 0 15px 15px 0; z-index: 100;
        }

        .clock-display { font-family: 'Orbitron'; font-size: 14px; color: #ff4d4d; opacity: 0.8; }

        .bottom-bar {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: rgba(10, 0, 0, 0.9); border-top: 2px solid #ff0000;
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }

        .nav-link { color: #fff; font-size: 20px; opacity: 0.5; transition: 0.3s; }
        .nav-link.active { opacity: 1; color: #ff0000; text-shadow: 0 0 10px #ff0000; }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 3000; display: none; align-items: center; justify-content: center;
        }

        .auth-card {
            background: #111; border: 2px solid #ff0000; padding: 40px;
            border-radius: 20px; width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 0 50px rgba(255,0,0,0.2);
        }

        input {
            width: 100%; background: #222; border: 1px solid #444; padding: 15px;
            border-radius: 10px; margin-bottom: 15px; color: white; outline: none;
        }

        input:focus { border-color: #ff0000; }

        .footer-credit {
            position: absolute; bottom: 85px; width: 100%; text-align: center;
            font-size: 9px; letter-spacing: 2px; opacity: 0.3; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header class="cyber-header">
        <div class="logo">XRAWS</div>
        <div id="clock" class="clock-display">00:00:00</div>
        <button class="join-btn" id="main-join" onclick="toggleAuth()">Join Now</button>
    </header>

    <div class="feed-container" id="main-feed"></div>

    <div class="footer-credit">Developed by XRAWS Community Elite © 2026</div>

    <nav class="bottom-bar">
        <div class="nav-link active"><i class="fas fa-th-large"></i></div>
        <div class="nav-link" onclick="handleUpload()"><i class="fas fa-plus-square" style="font-size: 30px;"></i></div>
        <div class="nav-link" onclick="toggleAuth()"><i class="fas fa-user-astronaut"></i></div>
    </nav>

    <div class="modal-overlay" id="auth-modal">
        <div class="auth-card">
            <h2 style="font-family:'Orbitron'" class="text-2xl mb-6 text-red-600 uppercase">System Access</h2>
            <input type="email" id="email" placeholder="NEURAL EMAIL">
            <input type="password" id="pass" placeholder="SECURITY KEY">
            <button onclick="processAuth()" class="w-full bg-red-600 py-3 rounded-lg font-bold uppercase tracking-widest">Connect</button>
            <button onclick="toggleAuth()" class="mt-4 text-xs opacity-50">ABORT MISSION</button>
        </div>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyD93aEghXrgkTYRKnQ98rVe1Fu9NdngcxY",
            authDomain: "soko-7d03e.firebaseapp.com",
            databaseURL: "https://soko-7d03e-default-rtdb.firebaseio.com",
            projectId: "soko-7d03e",
            storageBucket: "soko-7d03e.firebasestorage.app",
            messagingSenderId: "636395398521",
            appId: "1:636395398521:web:fbd094bd35a2883fda3ba8"
        };

        const ADMIN_ID = "jasim300v@gmail.com";
        firebase.initializeApp(config);
        const db = firebase.database();
        const auth = firebase.auth();

        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-US', { hour12: false });
        }, 1000);

        function toggleAuth() {
            const m = document.getElementById('auth-modal');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        async function processAuth() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            try {
                await auth.signInWithEmailAndPassword(e, p);
            } catch {
                await auth.createUserWithEmailAndPassword(e, p);
            }
            toggleAuth();
        }

        const uploader = cloudinary.createUploadWidget({
            cloudName: "dfscughol", uploadPreset: "update_vk"
        }, (err, res) => {
            if (res.event === "success") {
                db.ref('posts').push({
                    url: res.info.secure_url,
                    user: auth.currentUser ? auth.currentUser.email : "GUEST_USER",
                    likes: Math.floor(Math.random() * 100),
                    timestamp: Date.now()
                });
            }
        });

        function handleUpload() { uploader.open(); }

        auth.onAuthStateChanged(user => {
            const btn = document.getElementById('main-join');
            if(user) {
                btn.innerText = (user.email === ADMIN_ID) ? "ADMIN" : user.email.split('@')[0].toUpperCase();
                btn.style.background = "linear-gradient(90deg, #00ff00, #004a00)";
                btn.style.boxShadow = "0 0 15px #00ff00";
            }
        });

        db.ref('posts').on('value', snap => {
            const container = document.getElementById('main-feed');
            container.innerHTML = '';
            snap.forEach(child => {
                const data = child.val();
                const id = child.key;
                const isAdmin = auth.currentUser && auth.currentUser.email === ADMIN_ID;

                container.innerHTML += `
                    <div class="post-card">
                        <video src="${data.url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                        <div class="side-interface">
                            <div class="control-unit" onclick="db.ref('posts/${id}').update({likes: (data.likes||0)+1})">
                                <i class="fas fa-heart"></i>
                                <span>${data.likes||0}</span>
                            </div>
                            <div class="control-unit" onclick="alert('Comments loading...')">
                                <i class="fas fa-comment-dots"></i>
                                <span>99</span>
                            </div>
                            <div class="control-unit" onclick="navigator.clipboard.writeText('${data.url}');alert('Link Encrypted & Copied!')">
                                <i class="fas fa-share-alt"></i>
                                <span>SHARE</span>
                            </div>
                            ${isAdmin ? `<div class="control-unit" style="border-color:white" onclick="db.ref('posts/${id}').remove()">
                                <i class="fas fa-trash-alt" style="color:white"></i>
                            </div>` : ''}
                        </div>
                        <div class="video-meta">
                            <div class="user-tag" style="color:#ff0000; font-weight:bold; font-family:'Orbitron'">@${data.user.split('@')[0]}</div>
                            <div class="text-xs opacity-60 uppercase mt-1">Status: Active // Data Stream: Stable</div>
                        </div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
