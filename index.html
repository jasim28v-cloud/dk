<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>VØID_X | NEBULA ENGINE</title>
    
    <!-- Firebase & Cloudinary -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Cairo:wght@300;500;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-hue: 330;
            --neon: hsl(330, 100%, 50%);
            --neon-glow: hsla(330, 100%, 50%, 0.3);
            --bg: #050002;
            --void-depth: 0;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background: #000;
            color: #fff;
            overflow: hidden;
            font-family: 'Cairo', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* ==================== VOID ENGINE - الخلفية الكونية ==================== */
        .void-universe {
            position: fixed;
            inset: 0;
            z-index: -3;
            background: radial-gradient(circle at 50% 50%, 
                hsla(var(--primary-hue), 100%, 8%, 1) 0%,
                hsla(var(--primary-hue), 80%, 3%, 1) 40%,
                #000 100%);
            transition: background 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* تأثير الثقب الأسود عند الأطراف */
        .black-hole-vignette {
            position: fixed;
            inset: 0;
            z-index: -2;
            background: radial-gradient(circle at center, 
                transparent 30%,
                rgba(0, 0, 0, 0.4) 70%,
                rgba(0, 0, 0, 0.9) 100%);
            pointer-events: none;
            transition: opacity 0.8s;
        }

        /* حقل النجوم والجسيمات */
        .nebula-particles {
            position: fixed;
            inset: 0;
            z-index: -1;
            opacity: 0.6;
            background-image: 
                radial-gradient(2px 2px at 20% 30%, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 60% 70%, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 10% 80%, #fff, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 80% 20%, hsla(var(--primary-hue), 100%, 70%, 0.8), rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40% 50%, #fff, rgba(0,0,0,0)),
                radial-gradient(4px 4px at 90% 90%, hsla(var(--primary-hue), 100%, 60%, 0.6), rgba(0,0,0,0));
            background-size: 200% 200%;
            animation: nebulaDrift 30s infinite alternate;
            transition: background-image 1s;
        }

        @keyframes nebulaDrift {
            0% { background-position: 0% 0%; opacity: 0.4; }
            50% { background-position: 100% 50%; opacity: 0.7; }
            100% { background-position: 50% 100%; opacity: 0.5; }
        }

        /* ==================== VOID SCROLL ENGINE ==================== */
        .void-scroll-engine { 
            height: 100vh; 
            width: 100vw;
            overflow-y: scroll; 
            scroll-snap-type: y mandatory; 
            scrollbar-width: none;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            position: relative;
        }
        
        .void-scroll-engine::-webkit-scrollbar { 
            display: none; 
        }
        
        .video-segment { 
            height: 100vh; 
            width: 100vw; 
            scroll-snap-align: start; 
            scroll-snap-stop: always; 
            position: relative; 
            overflow: hidden;
            background: #000;
        }

        /* تأثير Black Hole على الفيديو */
        .video-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .video-container::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, 
                transparent 40%,
                rgba(0, 0, 0, 0.3) 80%,
                #000 100%);
            pointer-events: none;
            z-index: 10;
            transition: opacity 0.5s;
        }

        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover;
            filter: brightness(1.1) contrast(1.1);
            transition: filter 0.5s;
        }

        /* ==================== شعار VØID المتحرك ==================== */
        .void-mark {
            position: absolute;
            top: 15%;
            right: 5%;
            font-family: 'Orbitron';
            font-size: clamp(0.8rem, 3vw, 1.2rem);
            color: rgba(255,255,255,0.08);
            z-index: 20;
            letter-spacing: 8px;
            animation: voidFloat 12s infinite ease-in-out;
            text-shadow: 0 0 30px var(--neon);
            pointer-events: none;
            transform: rotate(-5deg);
        }

        @keyframes voidFloat {
            0%, 100% { transform: translate(0, 0) rotate(-5deg); opacity: 0.08; }
            50% { transform: translate(-40px, 60px) rotate(2deg); opacity: 0.2; }
        }

        /* ==================== الهيدر الزجاجي ==================== */
        .glass-header {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }

        .brand-pill {
            padding: 10px 28px;
            border-radius: 40px;
            background: rgba(10, 0, 5, 0.2);
            backdrop-filter: blur(30px);
            border: 1px solid hsla(var(--primary-hue), 100%, 50%, 0.3);
            border-left: 4px solid var(--neon);
            pointer-events: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5), 0 0 30px hsla(var(--primary-hue), 100%, 30%, 0.3);
            transition: all 0.5s;
        }

        .brand-name {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 30px var(--neon);
            font-size: 1.2rem;
        }

        .time-vortex {
            padding: 10px 20px;
            border-radius: 40px;
            background: rgba(10, 0, 5, 0.2);
            backdrop-filter: blur(30px);
            border: 1px solid hsla(var(--primary-hue), 100%, 50%, 0.3);
            font-family: 'Orbitron';
            font-size: 0.85rem;
            color: rgba(255,255,255,0.9);
            pointer-events: auto;
            letter-spacing: 2px;
        }

        /* ==================== الأزرار الجانبية ==================== */
        .action-cluster {
            position: absolute;
            left: 20px;
            bottom: 160px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 100;
        }

        .void-action {
            width: 60px;
            height: 60px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(10, 0, 5, 0.15);
            backdrop-filter: blur(30px);
            border: 1px solid hsla(var(--primary-hue), 100%, 50%, 0.3);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .void-action::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 30%, hsla(var(--primary-hue), 100%, 70%, 0.2), transparent);
            opacity: 0;
            transition: opacity 0.4s;
        }

        .void-action:hover::before {
            opacity: 1;
        }

        .void-action i {
            font-size: 1.6rem;
            color: var(--neon);
            filter: drop-shadow(0 0 15px var(--neon));
            z-index: 1;
        }

        .action-label {
            font-size: 9px;
            font-weight: 700;
            margin-top: 3px;
            color: #fff;
            opacity: 0.8;
            font-family: 'Orbitron';
            letter-spacing: 1px;
            z-index: 1;
        }

        .like-counter {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--neon);
            color: #000;
            font-size: 9px;
            font-weight: 900;
            padding: 2px 8px;
            border-radius: 30px;
            font-family: 'Orbitron';
            box-shadow: 0 0 20px var(--neon);
            z-index: 2;
        }

        /* ==================== شريط التنقل السفلي ==================== */
        .nav-bar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 420px;
            height: 80px;
            border-radius: 40px;
            background: rgba(5, 0, 2, 0.3);
            backdrop-filter: blur(40px);
            border: 1px solid hsla(var(--primary-hue), 100%, 50%, 0.2);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 200;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 40px hsla(var(--primary-hue), 100%, 30%, 0.3);
        }

        .nav-item {
            color: rgba(255,255,255,0.4);
            transition: all 0.3s;
            cursor: pointer;
            padding: 12px;
        }

        .nav-item:hover {
            color: var(--neon);
            filter: drop-shadow(0 0 15px var(--neon));
        }

        /* ==================== زر الرفع المبهر ==================== */
        .upload-nexus {
            background: linear-gradient(135deg, var(--neon), hsla(var(--primary-hue), 100%, 40%, 1));
            box-shadow: 0 0 50px var(--neon), inset 0 0 30px rgba(255,255,255,0.4);
            cursor: pointer;
            width: 80px;
            height: 80px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translateY(-25px);
            border: 3px solid rgba(255,255,255,0.4);
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
            overflow: hidden;
            animation: nexusPulse 2.5s infinite;
        }

        @keyframes nexusPulse {
            0%, 100% { 
                box-shadow: 0 0 40px var(--neon), inset 0 0 20px rgba(255,255,255,0.3);
                transform: translateY(-25px) scale(1);
            }
            50% { 
                box-shadow: 0 0 80px var(--neon), inset 0 0 40px rgba(255,255,255,0.6);
                transform: translateY(-28px) scale(1.03);
            }
        }

        .upload-nexus::before {
            content: '';
            position: absolute;
            inset: -50%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: translateX(-100%) rotate(45deg);
            transition: transform 0.8s;
        }

        .upload-nexus:hover::before {
            transform: translateX(100%) rotate(45deg);
        }

        .upload-nexus i {
            font-size: 2.5rem;
            color: #fff;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
            z-index: 1;
        }

        /* ==================== حالة الرفع ==================== */
        #upload-status {
            position: fixed;
            bottom: 130px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(40px);
            padding: 25px;
            border-radius: 30px;
            z-index: 2000;
            display: none;
            border: 1px solid var(--neon);
            box-shadow: 0 0 60px hsla(var(--primary-hue), 100%, 50%, 0.3);
        }

        .progress-ring {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
            margin: 15px 0 10px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--neon), #fff, var(--neon));
            background-size: 200% 100%;
            animation: progressShine 1.5s infinite;
            border-radius: 10px;
            box-shadow: 0 0 20px var(--neon);
        }

        @keyframes progressShine {
            0% { background-position: 0% 0%; }
            100% { background-position: 200% 0%; }
        }

        /* ==================== لوحة الأدمن ==================== */
        #admin-panel, #chat-overlay { 
            position: fixed; 
            inset: 0; 
            z-index: 1000; 
            background: rgba(5,0,2,0.98); 
            backdrop-filter: blur(50px);
            display: none; 
            flex-direction: column; 
            padding: 40px 25px; 
            overflow-y: auto; 
        }

        .stat-card { 
            background: rgba(255,255,255,0.03); 
            border: 1px solid hsla(var(--primary-hue), 100%, 50%, 0.3); 
            border-radius: 25px; 
            padding: 20px; 
            text-align: center;
            box-shadow: 0 0 30px hsla(var(--primary-hue), 100%, 30%, 0.1);
        }
    </style>
</head>
<body>

    <div class="void-universe" id="voidUniverse"></div>
    <div class="black-hole-vignette"></div>
    <div class="nebula-particles" id="nebulaParticles"></div>

    <header class="glass-header">
        <div class="brand-pill">
            <span class="brand-name">VØID_X</span>
        </div>
        <div class="time-vortex" id="voidClock">00:00:00</div>
    </header>

    <main class="void-scroll-engine" id="videoStack"></main>

    <div id="upload-status">
        <div class="flex items-center gap-4">
            <i class="fas fa-cloud-upload-alt text-3xl" style="color: var(--neon); filter: drop-shadow(0 0 20px var(--neon));"></i>
            <span id="statusMessage" class="font-[Orbitron] text-lg">جاري التهيئة...</span>
        </div>
        <div class="progress-ring">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div id="progressPercent" class="text-right text-sm opacity-60 font-[Orbitron]">0%</div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item" onclick="openAdmin()">
            <i class="fas fa-fingerprint text-2xl"></i>
        </div>
        <div class="upload-nexus" id="uploadTrigger">
            <i class="fas fa-plus"></i>
        </div>
        <div class="nav-item" onclick="toggleChat()">
            <i class="fas fa-comment-dots text-2xl"></i>
        </div>
    </nav>

    <div id="admin-panel">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-[Orbitron] text-2xl tracking-widest" style="color: var(--neon); text-shadow: 0 0 30px var(--neon);">VOID_CONTROL</h2>
            <i class="fas fa-xmark text-3xl text-white/20 cursor-pointer" onclick="closeAdmin()"></i>
        </div>
        <div class="grid grid-cols-2 gap-5 mb-8">
            <div class="stat-card">
                <i class="fas fa-eye text-2xl mb-3" style="color: var(--neon);"></i>
                <div class="text-xs opacity-50 font-bold mb-1">ONLINE_NOW</div>
                <div class="text-3xl font-[Orbitron]" id="live-users">0</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-film text-2xl mb-3" style="color: #00f3ff;"></i>
                <div class="text-xs opacity-50 font-bold mb-1">VIDEOS</div>
                <div class="text-3xl font-[Orbitron]" id="total-vids-count">0</div>
            </div>
        </div>
        <div id="admin-list" class="flex-1 space-y-4"></div>
    </div>

    <div id="chat-overlay">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-[Orbitron] text-2xl" style="color: var(--neon);">VOID_CHAT</h2>
            <i class="fas fa-chevron-down text-3xl cursor-pointer" onclick="toggleChat()"></i>
        </div>
        <div id="chat-box" class="flex-1 overflow-y-auto space-y-4"></div>
        <div class="mt-4 flex gap-3">
            <input type="text" id="msg-input" class="bg-white/5 flex-1 rounded-2xl p-4 outline-none border border-white/10" placeholder="رسالتك...">
            <button onclick="sendMsg()" class="px-6 rounded-2xl font-bold" style="background: var(--neon);">إرسال</button>
        </div>
    </div>

    <script>
        // ==================== FIREBASE CONFIG ====================
        const firebaseConfig = {
            apiKey: "AIzaSyBn7HuSVO5m1yNKnZzXfeIHuI5S0hsQPmQ",
            authDomain: "vexe-f6558.firebaseapp.com",
            databaseURL: "https://vexe-f6558-default-rtdb.firebaseio.com",
            projectId: "vexe-f6558",
            storageBucket: "vexe-f6558.firebasestorage.app",
            messagingSenderId: "1033562853687",
            appId: "1:1033562853687:web:2fa53a0a2880a8e4188ab2"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        // ==================== VARIABLES ====================
        const ADMIN_CODE = "1234";
        let isMuted = true;
        let globalVideoData = null;
        const USR_ID = "VOID_" + Math.random().toString(36).substr(2, 6).toUpperCase();
        let currentHue = 330;
        
        // ==================== COLOR SYSTEM ====================
        function updateVoidColor(hue) {
            currentHue = hue;
            document.documentElement.style.setProperty('--primary-hue', hue);
            document.documentElement.style.setProperty('--neon', `hsl(${hue}, 100%, 50%)`);
            document.documentElement.style.setProperty('--neon-glow', `hsla(${hue}, 100%, 50%, 0.3)`);
            
            // تحديث الخلفية الكونية
            document.getElementById('voidUniverse').style.background = 
                `radial-gradient(circle at 50% 50%, hsla(${hue}, 100%, 8%, 1) 0%, hsla(${hue}, 80%, 3%, 1) 40%, #000 100%)`;
            
            // تحديث النجوم
            document.getElementById('nebulaParticles').style.backgroundImage = `
                radial-gradient(2px 2px at 20% 30%, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 60% 70%, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 10% 80%, #fff, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 80% 20%, hsl(${hue}, 100%, 70%, 0.8), rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40% 50%, #fff, rgba(0,0,0,0)),
                radial-gradient(4px 4px at 90% 90%, hsl(${hue}, 100%, 60%, 0.6), rgba(0,0,0,0))
            `;
        }

        // تغيير اللون مع كل فيديو
        function cycleVoidColor() {
            const hues = [330, 180, 280, 45, 200, 0, 300, 150, 30];
            const nextHue = hues[Math.floor(Math.random() * hues.length)];
            updateVoidColor(nextHue);
        }

        // ==================== CLOUDINARY UPLOAD ====================
        const cloudinaryWidget = cloudinary.createUploadWidget({
            cloudName: "duzoqh3jp",
            uploadPreset: "so_34k",
            sources: ['local', 'camera', 'url'],
            multiple: false,
            clientAllowedFormats: ['mp4', 'mov', 'webm'],
            maxFileSize: 500000000,
            language: 'ar',
            styles: {
                palette: {
                    window: "#000000",
                    windowBorder: "#ff007f",
                    tabIcon: "#ff007f",
                    menuIcons: "#ff007f",
                    textDark: "#ffffff",
                    textLight: "#ffffff",
                    link: "#ff007f",
                    action: "#ff007f",
                    inProgress: "#00f3ff",
                    complete: "#00ffaa",
                    error: "#ff0000",
                    sourceBg: "#0a0005"
                }
            }
        }, (error, result) => {
            if (error) {
                console.error(error);
                document.getElementById('upload-status').style.display = 'none';
                return;
            }
            
            if (result.event === "queues-start") {
                document.getElementById('upload-status').style.display = 'block';
                document.getElementById('statusMessage').textContent = 'بدء الرفع...';
            }
            
            if (result.event === "progress") {
                const percent = Math.round((result.info.progress.loaded / result.info.progress.total) * 100);
                document.getElementById('progressFill').style.width = percent + '%';
                document.getElementById('progressPercent').textContent = percent + '%';
                document.getElementById('statusMessage').textContent = `جاري الرفع...`;
            }
            
            if (result.event === "success") {
                document.getElementById('statusMessage').textContent = '✅ تم الرفع!';
                
                db.ref('videos/').push({
                    url: result.info.secure_url,
                    likes: 0,
                    timestamp: Date.now(),
                    hue: currentHue
                }).then(() => {
                    setTimeout(() => {
                        document.getElementById('upload-status').style.display = 'none';
                        document.getElementById('progressFill').style.width = '0%';
                    }, 1500);
                    cycleVoidColor();
                });
            }
        });

        document.getElementById("uploadTrigger").addEventListener("click", () => {
            cloudinaryWidget.open();
        });

        // ==================== CLOCK ====================
        function updateClock() {
            const now = new Date();
            document.getElementById('voidClock').textContent = 
                now.toLocaleTimeString('en-GB', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ==================== PRESENCE ====================
        const presenceRef = db.ref('presence/' + USR_ID);
        presenceRef.set(true);
        presenceRef.onDisconnect().remove();
        db.ref('presence').on('value', (s) => {
            const el = document.getElementById('live-users');
            if(el) el.innerText = s.numChildren();
        });

        // ==================== VIDEOS DISPLAY ====================
        db.ref('videos').on('value', (snap) => {
            const container = document.getElementById('videoStack');
            const data = snap.val();
            globalVideoData = data;
            container.innerHTML = '';
            
            const count = data ? Object.keys(data).length : 0;
            document.getElementById('total-vids-count').innerText = count;
            
            if(!data) {
                container.innerHTML = `
                    <div class="video-segment flex items-center justify-center">
                        <div class="text-center opacity-30">
                            <i class="fas fa-black-hole text-8xl mb-8" style="color: var(--neon);"></i>
                            <p class="font-[Orbitron] text-3xl tracking-widest mb-4">VOID EMPTY</p>
                            <p class="text-sm opacity-50">اضغط على ✦ للرفع</p>
                        </div>
                    </div>`;
                return;
            }
            
            const fragment = document.createDocumentFragment();
            const videos = Object.entries(data).reverse();
            
            videos.forEach(([id, vid], index) => {
                if (index === 0 && vid.hue) {
                    updateVoidColor(vid.hue);
                }
                
                const section = document.createElement('section');
                section.className = 'video-segment';
                section.dataset.videoId = id;
                section.innerHTML = `
                    <div class="video-container">
                        <div class="void-mark">VØID_X // NEBULA</div>
                        <video loop playsinline muted data-src="${vid.url}"></video>
                        <div class="action-cluster">
                            <div class="void-action" onclick="toggleVoidMute()">
                                <i class="fas fa-volume-xmark mute-icon"></i>
                                <span class="action-label">VOID</span>
                            </div>
                            <div class="void-action" onclick="likeVideo('${id}')">
                                <i class="fas fa-bolt"></i>
                                <span class="action-label">LIKE</span>
                                <span class="like-counter" id="likes-${id}">${vid.likes || 0}</span>
                            </div>
                            <div class="void-action" onclick="toggleChat()">
                                <i class="fas fa-terminal"></i>
                                <span class="action-label">CHAT</span>
                            </div>
                        </div>
                    </div>`;
                fragment.appendChild(section);
            });
            
            container.appendChild(fragment);
            initVoidObserver();
            updateMuteIcons();
        });

        // ==================== VIDEO OBSERVER ====================
        function initVoidObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    
                    if (entry.isIntersecting) {
                        if (!video.src) video.src = video.dataset.src;
                        video.muted = isMuted;
                        video.play().catch(()=>{});
                        
                        const videoId = entry.target.dataset.videoId;
                        if (videoId && globalVideoData && globalVideoData[videoId]?.hue) {
                            updateVoidColor(globalVideoData[videoId].hue);
                        }
                    } else {
                        video.pause();
                    }
                });
            }, { threshold: 0.7 });
            
            document.querySelectorAll('.video-segment').forEach(seg => observer.observe(seg));
        }

        // ==================== MUTE ====================
        function toggleVoidMute() {
            isMuted = !isMuted;
            document.querySelectorAll('video').forEach(v => v.muted = isMuted);
            updateMuteIcons();
        }

        function updateMuteIcons() {
            document.querySelectorAll('.mute-icon').forEach(icon => {
                icon.className = isMuted ? 'fas fa-volume-xmark mute-icon' : 'fas fa-volume-high mute-icon';
            });
        }

        // ==================== LIKE ====================
        function likeVideo(id) {
            db.ref(`videos/${id}/likes`).transaction(l => (l || 0) + 1);
            const el = document.getElementById(`likes-${id}`);
            if (el) {
                el.style.transform = 'scale(1.5)';
                setTimeout(() => el.style.transform = 'scale(1)', 200);
            }
        }

        // ==================== ADMIN ====================
        function openAdmin() { 
            if(prompt("ADMIN PASS:") === ADMIN_CODE) { 
                renderAdminContent(); 
                document.getElementById('admin-panel').style.display = 'flex'; 
            }
        }
        
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
        
        function deleteVideo(id) { 
            if(confirm("حذف الفيديو؟")) { 
                db.ref(`videos/${id}`).remove(); 
                setTimeout(renderAdminContent, 300); 
            }
        }
        
        function renderAdminContent() {
            const adminList = document.getElementById('admin-list');
            adminList.innerHTML = '';
            if(!globalVideoData) return;
            Object.keys(globalVideoData).reverse().forEach((id) => {
                const vid = globalVideoData[id];
                adminList.innerHTML += `
                    <div class="video-item border-l-4" style="border-color: var(--neon);">
                        <video class="w-16 h-20 rounded-lg object-cover bg-white/5" src="${vid.url}" muted></video>
                        <div class="flex-1 px-4">
                             <span class="text-xs opacity-30 font-mono block">${id.substring(0,8)}</span>
                             <span class="text-sm font-bold" style="color: var(--neon);">${vid.likes || 0} LIKES</span>
                        </div>
                        <button onclick="deleteVideo('${id}')" class="text-red-500 p-2"><i class="fas fa-trash-can"></i></button>
                    </div>`;
            });
        }

        // ==================== CHAT ====================
        function toggleChat() { 
            const c = document.getElementById('chat-overlay'); 
            c.style.display = c.style.display === 'flex' ? 'none' : 'flex'; 
        }
        
        function sendMsg() {
            const inp = document.getElementById('msg-input');
            if(inp.value.trim()){ 
                db.ref('chat').push({user: USR_ID, text: inp.value}); 
                inp.value = ''; 
            }
        }

        db.ref('chat').limitToLast(15).on('value', s => {
            const box = document.getElementById('chat-box'); 
            box.innerHTML = '';
            s.forEach(m => {
                const d = m.val();
                box.innerHTML += `<div class="bg-white/5 p-4 rounded-2xl border-l-2" style="border-color: var(--neon);">
                    <span class="text-xs font-bold block mb-1 uppercase" style="color: var(--neon);">${d.user}</span>
                    <p class="text-sm text-white/80">${d.text}</p>
                </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });

        // ==================== FULLSCREEN ====================
        document.addEventListener('click', function requestFullScreen() {
            document.documentElement.requestFullscreen?.();
            document.removeEventListener('click', requestFullScreen);
        }, { once: true });

        // ==================== INIT ====================
        console.log('%c🔥 VOID ENGINE // NEBULA ONLINE', 'color: #ff007f; font-size: 18px; font-family: monospace; font-weight: bold; text-shadow: 0 0 20px #ff007f;');
        updateVoidColor(330);
        
    </script>
</body>
</html>
