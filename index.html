<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VØID_X | ULTRA GLASS PRO</title>
    
    <!-- Firebase SDK (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;700&display=swap');
        
        :root { --neon: #ff007f; --bg: #050002; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; user-select: none; }

        .pink-void-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #1a000d 0%, #000 100%); transition: background 0.8s ease; }
        
        .scroll-engine { 
            height: 100vh; 
            overflow-y: scroll; 
            scroll-snap-type: y mandatory; 
            scrollbar-width: none; 
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .scroll-engine::-webkit-scrollbar { display: none; }
        
        .video-segment { height: 100vh; width: 100vw; scroll-snap-align: start; scroll-snap-stop: always; position: relative; overflow: hidden; }
        .crystal-frame { width: 100%; height: 100%; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        header { position: fixed; top: 25px; left: 20px; right: 20px; z-index: 500; display: flex; justify-content: space-between; align-items: center; pointer-events: none; }
        .brand-box { padding: 8px 22px; border-radius: 20px; border-left: 4px solid var(--neon); background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); pointer-events: auto; transition: 0.5s ease; }
        .brand-name { font-family: 'Orbitron', sans-serif; font-weight: 900; letter-spacing: 2px; color: #fff; text-shadow: 0 0 15px var(--neon); }

        .v-watermark { position: absolute; top: 20%; right: 10%; font-family: 'Orbitron'; font-size: 0.8rem; color: rgba(255,255,255,0.15); z-index: 20; letter-spacing: 4px; animation: floatMark 10s infinite; text-shadow: 0 0 5px var(--neon); }
        @keyframes floatMark { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(-20px, 40px); } }

        .side-actions { position: absolute; left: 20px; bottom: 180px; display: flex; flex-direction: column; gap: 15px; z-index: 100; }
        .action-btn { width: 55px; height: 55px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; cursor: pointer; }
        .action-btn i { font-size: 1.3rem; color: var(--neon); filter: drop-shadow(0 0 8px var(--neon)); transition: 0.3s; }
        .btn-label { font-size: 9px; font-weight: bold; margin-top: 2px; color: #fff; opacity: 0.7; font-family: 'Orbitron'; }

        nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; height: 75px; border-radius: 35px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; align-items: center; z-index: 200; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .finger-admin { color: var(--neon); cursor: pointer; filter: drop-shadow(0 0 10px var(--neon)); transition: 0.5s; }

        #upload-trigger { 
            background: var(--neon); 
            box-shadow: 0 0 35px var(--neon), inset 0 0 15px rgba(255,255,255,0.5);
            cursor: pointer; 
            width: 65px; 
            height: 65px; 
            border-radius: 25px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transform: translateY(-15px); 
            border: 3px solid rgba(255,255,255,0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: btnPulse 2s infinite;
            position: relative;
            overflow: hidden;
        }
        
        @keyframes btnPulse {
            0%, 100% { box-shadow: 0 0 35px var(--neon), inset 0 0 15px rgba(255,255,255,0.3); }
            50% { box-shadow: 0 0 60px var(--neon), inset 0 0 25px rgba(255,255,255,0.6); }
        }
        
        #upload-trigger:hover {
            transform: translateY(-20px) scale(1.05);
        }
        
        #upload-trigger i {
            font-size: 2rem;
            color: #fff;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3));
        }

        #admin-panel, #chat-overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(5,0,2,0.97); display: none; flex-direction: column; padding: 40px 25px; backdrop-filter: blur(30px); overflow-y: auto; }
        .stat-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 15px; text-align: center; }
        .video-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.1); }
        
        #clock { transition: 0.5s; border-color: rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); }

        #upload-options-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(5,0,2,0.98);
            backdrop-filter: blur(30px);
            padding: 30px;
            border-radius: 30px;
            z-index: 1001;
            border: 1px solid var(--neon);
            width: 90%;
            max-width: 350px;
            display: none;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }
        
        .upload-option-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 20px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .upload-option-btn:hover {
            background: var(--neon);
            box-shadow: 0 0 30px var(--neon);
        }
        
        .upload-option-btn i {
            font-size: 1.8rem;
            width: 40px;
        }
        
        #upload-progress {
            position: fixed;
            bottom: 120px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            padding: 20px;
            border-radius: 30px;
            z-index: 2000;
            display: none;
            border: 1px solid var(--neon);
        }
        
        .progress-bar {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--neon);
            box-shadow: 0 0 20px var(--neon);
            transition: width 0.3s;
        }
        
        #file-input {
            display: none;
        }
    </style>
</head>
<body>

    <div class="pink-void-bg" id="dynamicBg"></div>

    <header>
        <div class="brand-box"><span class="brand-name">VØID_X</span></div>
        <div class="text-[11px] font-[Orbitron] text-white/80 px-4 py-2 rounded-full border" id="clock">00:00:00</div>
    </header>

    <main class="scroll-engine" id="video-stack"></main>

    <input type="file" id="file-input" accept="video/*" capture="environment">

    <div id="upload-options-modal">
        <h3 class="font-[Orbitron] text-pink-500 text-xl text-center mb-2">✧ اختر طريقة الرفع ✧</h3>
        
        <div class="upload-option-btn" onclick="uploadFromGallery()">
            <i class="fas fa-images"></i>
            <div>
                <div class="font-bold">معرض الصور</div>
                <div class="text-xs opacity-60">اختر فيديو من هاتفك</div>
            </div>
        </div>
        
        <div class="upload-option-btn" onclick="uploadFromCamera()">
            <i class="fas fa-camera"></i>
            <div>
                <div class="font-bold">الكاميرا</div>
                <div class="text-xs opacity-60">تصوير فيديو جديد</div>
            </div>
        </div>
        
        <div class="upload-option-btn" onclick="uploadFromUrl()">
            <i class="fas fa-link"></i>
            <div>
                <div class="font-bold">رابط مباشر</div>
                <div class="text-xs opacity-60">الصق رابط الفيديو</div>
            </div>
        </div>
        
        <button onclick="closeUploadModal()" class="bg-white/10 p-4 rounded-2xl text-sm">إلغاء</button>
    </div>

    <div id="url-modal" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(5,0,2,0.98); backdrop-filter: blur(30px); padding: 30px; border-radius: 30px; z-index: 1002; border: 1px solid var(--neon); width: 90%; max-width: 400px; display: none; flex-direction: column; gap: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.8);">
        <h3 class="font-[Orbitron] text-pink-500 text-xl text-center">✧ رابط الفيديو ✧</h3>
        <input type="text" id="direct-url" placeholder="أدخل رابط الفيديو (MP4)" dir="ltr" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 20px; color: #fff; outline: none;">
        <button onclick="uploadDirectUrl()" style="background: var(--neon); border: none; padding: 15px; border-radius: 20px; color: #fff; font-weight: bold; cursor: pointer; box-shadow: 0 0 30px var(--neon);"><i class="fas fa-cloud-upload-alt ml-2"></i> رفع</button>
        <button onclick="closeUrlModal()" style="background: rgba(255,255,255,0.1); border: none; padding: 12px; border-radius: 20px; color: #fff; cursor: pointer;">إلغاء</button>
    </div>

    <div id="upload-progress">
        <div class="flex items-center gap-3 mb-2">
            <i class="fas fa-cloud-upload-alt text-pink-500"></i>
            <span id="progress-text">جاري رفع الفيديو...</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div id="progress-percent" class="text-right text-xs mt-2 opacity-60">0%</div>
    </div>

    <nav id="main-nav">
        <div class="finger-admin" onclick="openAdmin()"><i class="fas fa-fingerprint text-3xl"></i></div>
        <div id="upload-trigger" onclick="openUploadModal()"><i class="fas fa-plus"></i></div>
        <div onclick="toggleChat()" style="color: rgba(255,255,255,0.3);"><i class="fas fa-comment-dots text-2xl"></i></div>
    </nav>

    <div id="admin-panel">
        <div class="flex justify-between items-center mb-6">
            <h2 class="font-[Orbitron] text-xl text-pink-500 tracking-widest">GHOST_DASHBOARD</h2>
            <i class="fas fa-xmark text-3xl text-white/20 cursor-pointer" onclick="closeAdmin()"></i>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="stat-card border-b-2 border-pink-500">
                <i class="fas fa-eye text-pink-500 mb-2"></i>
                <div class="text-[10px] opacity-50 font-bold">ONLINE_NOW</div>
                <div class="text-2xl font-[Orbitron]" id="live-users">0</div>
            </div>
            <div class="stat-card border-b-2 border-cyan-500">
                <i class="fas fa-film text-cyan-500 mb-2"></i>
                <div class="text-[10px] opacity-50 font-bold">TOTAL_VIDEOS</div>
                <div class="text-2xl font-[Orbitron]" id="total-vids-count">0</div>
            </div>
        </div>
        <div id="admin-list" class="flex-1 space-y-4"></div>
    </div>

    <div id="chat-overlay">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-[Orbitron] text-pink-500 text-2xl">VØID_CHAT</h2>
            <i class="fas fa-chevron-down text-3xl cursor-pointer" onclick="toggleChat()"></i>
        </div>
        <div id="chat-box" class="flex-1 overflow-y-auto space-y-4"></div>
        <div class="mt-4 flex gap-3">
            <input type="text" id="msg-input" class="bg-white/5 flex-1 rounded-2xl p-4 outline-none border border-white/10" placeholder="Type here...">
            <button onclick="sendMsg()" class="bg-pink-600 px-6 rounded-2xl"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        // ==================== Firebase Config (تم تحديثه) ====================
        const firebaseConfig = {
            apiKey: "AIzaSyBn7HuSVO5m1yNKnZzXfeIHuI5S0hsQPmQ",
            authDomain: "vexe-f6558.firebaseapp.com",
            databaseURL: "https://vexe-f6558-default-rtdb.firebaseio.com",
            projectId: "vexe-f6558",
            storageBucket: "vexe-f6558.firebasestorage.app",
            messagingSenderId: "1033562853687",
            appId: "1:1033562853687:web:2fa53a0a2880a8e4188ab2",
            measurementId: "G-HVD1JPB505"
        };
        
        // تهيئة Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();
        
        console.log('✅ Firebase تم تهيئته بالإعدادات الجديدة');
        
        // ==================== المتغيرات ====================
        const ADMIN_CODE = "1234";
        let isMuted = true;
        let globalVideoData = null;
        const USR_ID = "ION-" + Math.floor(Math.random()*999);
        
        // الألوان الديناميكية
        const colorPalette = ['#ff007f', '#00f3ff', '#00ffaa', '#ff5500', '#b000ff', '#ff0000'];

        // ==================== Presence ====================
        const myPresenceRef = db.ref('presence/' + USR_ID);
        myPresenceRef.set(true);
        myPresenceRef.onDisconnect().remove();
        db.ref('presence').on('value', (s) => {
            if(document.getElementById('live-users')) document.getElementById('live-users').innerText = s.numChildren();
        });

        // ==================== الساعة ====================
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);

        // ==================== فتح/إغلاق النوافذ ====================
        function openUploadModal() {
            document.getElementById('upload-options-modal').style.display = 'flex';
        }
        
        function closeUploadModal() {
            document.getElementById('upload-options-modal').style.display = 'none';
        }
        
        function closeUrlModal() {
            document.getElementById('url-modal').style.display = 'none';
        }
        
        // ==================== الرفع من المعرض ====================
        function uploadFromGallery() {
            closeUploadModal();
            const fileInput = document.getElementById('file-input');
            fileInput.removeAttribute('capture');
            fileInput.click();
        }
        
        // ==================== الرفع من الكاميرا ====================
        function uploadFromCamera() {
            closeUploadModal();
            const fileInput = document.getElementById('file-input');
            fileInput.setAttribute('capture', 'environment');
            fileInput.click();
        }
        
        // ==================== الرفع برابط ====================
        function uploadFromUrl() {
            closeUploadModal();
            document.getElementById('url-modal').style.display = 'flex';
        }
        
        // ==================== معالجة اختيار الملف ====================
        document.getElementById('file-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            if (!file.type.startsWith('video/')) {
                alert('❌ الرجاء اختيار ملف فيديو فقط');
                return;
            }
            
            const progressDiv = document.getElementById('upload-progress');
            const progressFill = document.getElementById('progress-fill');
            const progressText = document.getElementById('progress-text');
            const progressPercent = document.getElementById('progress-percent');
            
            progressDiv.style.display = 'block';
            progressText.textContent = `جاري رفع: ${file.name}`;
            
            try {
                const storageRef = storage.ref(`videos/${Date.now()}_${file.name}`);
                const uploadTask = storageRef.put(file);
                
                uploadTask.on('state_changed',
                    (snapshot) => {
                        const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                        progressFill.style.width = progress + '%';
                        progressPercent.textContent = Math.round(progress) + '%';
                    },
                    (error) => {
                        console.error('❌ Upload error:', error);
                        alert('❌ فشل الرفع: ' + error.message);
                        progressDiv.style.display = 'none';
                    },
                    async () => {
                        const downloadURL = await uploadTask.snapshot.ref.getDownloadURL();
                        
                        await db.ref('videos/').push({
                            url: downloadURL,
                            likes: 0,
                            timestamp: Date.now(),
                            filename: file.name
                        });
                        
                        progressDiv.style.display = 'none';
                        progressFill.style.width = '0%';
                        document.getElementById('file-input').value = '';
                        
                        changeThemeColor();
                        
                        alert('✅ تم رفع الفيديو بنجاح!');
                    }
                );
                
            } catch (error) {
                console.error('❌ Error:', error);
                alert('❌ حدث خطأ: ' + error.message);
                progressDiv.style.display = 'none';
            }
        });
        
        // ==================== رفع رابط مباشر ====================
        function uploadDirectUrl() {
            const input = document.getElementById('direct-url');
            const url = input.value.trim();
            
            if (!url) { alert("أدخل رابط الفيديو"); return; }
            if (!url.startsWith('http')) { alert("رابط غير صالح"); return; }
            
            db.ref('videos/').push({ 
                url: url, 
                likes: 0, 
                timestamp: Date.now() 
            }).then(() => {
                input.value = '';
                closeUrlModal();
                changeThemeColor();
                alert('✅ تم إضافة الفيديو بنجاح!');
            }).catch(err => alert("فشل: " + err.message));
        }

        // ==================== تغيير اللون الديناميكي ====================
        function changeThemeColor() {
            const randomColor = colorPalette[Math.floor(Math.random() * colorPalette.length)];
            document.documentElement.style.setProperty('--neon', randomColor);
            
            const bg = document.getElementById('dynamicBg');
            if (randomColor === '#ff007f') bg.style.background = 'radial-gradient(circle at 50% 50%, #1a000d 0%, #000 100%)';
            else if (randomColor === '#00f3ff') bg.style.background = 'radial-gradient(circle at 50% 50%, #001a1a 0%, #000 100%)';
            else if (randomColor === '#00ffaa') bg.style.background = 'radial-gradient(circle at 50% 50%, #001a0d 0%, #000 100%)';
            else if (randomColor === '#ff5500') bg.style.background = 'radial-gradient(circle at 50% 50%, #1a0a00 0%, #000 100%)';
            else if (randomColor === '#b000ff') bg.style.background = 'radial-gradient(circle at 50% 50%, #0d001a 0%, #000 100%)';
            else bg.style.background = 'radial-gradient(circle at 50% 50%, #1a0000 0%, #000 100%)';
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.querySelectorAll('video').forEach(v => v.muted = isMuted);
            const icon = isMuted ? 'fas fa-volume-xmark' : 'fas fa-volume-high';
            document.querySelectorAll('.mute-trigger-icon').forEach(i => i.className = icon + ' mute-trigger-icon');
        }

        // ==================== عرض الفيديوهات ====================
        db.ref('videos').on('value', (snap) => {
            const container = document.getElementById('video-stack');
            const data = snap.val();
            globalVideoData = data; 
            container.innerHTML = '';
            if(!data) {
                document.getElementById('total-vids-count').innerText = '0';
                return;
            }
            document.getElementById('total-vids-count').innerText = Object.keys(data).length;
            
            changeThemeColor();
            
            const fragment = document.createDocumentFragment();
            Object.keys(data).reverse().forEach((id) => {
                const vid = data[id];
                const section = document.createElement('section');
                section.className = 'video-segment';
                section.innerHTML = `
                    <div class="crystal-frame">
                        <div class="v-watermark">VØID_X SUPREME</div>
                        <video loop playsinline muted data-src="${vid.url}" onclick="this.paused ? this.play() : this.pause()"></video>
                        <div class="side-actions">
                            <div class="action-btn" onclick="toggleMute()">
                                <i class="${isMuted ? 'fas fa-volume-xmark' : 'fas fa-volume-high'} mute-trigger-icon"></i>
                                <span class="btn-label">AUDIO</span>
                            </div>
                            <div class="action-btn" onclick="likeVideo('${id}')">
                                <i class="fas fa-bolt"></i>
                                <span class="btn-label">${vid.likes || 0}</span>
                            </div>
                            <div class="action-btn" onclick="toggleChat()">
                                <i class="fas fa-terminal"></i>
                                <span class="btn-label">CHAT</span>
                            </div>
                        </div>
                    </div>`;
                fragment.appendChild(section);
            });
            container.appendChild(fragment);
            initObserver();
        });

        function renderAdminContent() {
            const adminList = document.getElementById('admin-list');
            adminList.innerHTML = '';
            if(!globalVideoData) return;
            Object.keys(globalVideoData).reverse().forEach((id) => {
                const vid = globalVideoData[id];
                adminList.innerHTML += `
                    <div class="video-item border-l-4 border-pink-600">
                        <video class="w-16 h-20 rounded-lg object-cover bg-white/5" src="${vid.url}" muted></video>
                        <div class="flex-1 px-4">
                             <span class="text-[10px] opacity-30 font-mono block">${id.substring(0,8)}</span>
                             <span class="text-pink-500 text-xs font-bold">${vid.likes || 0} LIKES</span>
                        </div>
                        <button onclick="deleteVideo('${id}')" class="text-red-500 p-2"><i class="fas fa-trash-can"></i></button>
                    </div>`;
            });
        }

        function openAdmin() { if(prompt("ADMIN PASS:") === ADMIN_CODE) { renderAdminContent(); document.getElementById('admin-panel').style.display = 'flex'; } }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
        function deleteVideo(id) { if(confirm("حذف الإشارة نهائياً؟")) { db.ref(`videos/${id}`).remove(); setTimeout(renderAdminContent, 300); } }
        
        function likeVideo(id) { db.ref(`videos/${id}/likes`).transaction(l => (l || 0) + 1); }
        function toggleChat() { const c = document.getElementById('chat-overlay'); c.style.display = c.style.display==='flex'?'none':'flex'; }
        function sendMsg() {
            const inp = document.getElementById('msg-input');
            if(inp.value.trim()){ db.ref('chat').push({user:USR_ID, text:inp.value}); inp.value=''; }
        }

        db.ref('chat').limitToLast(15).on('value', s => {
            const box = document.getElementById('chat-box'); box.innerHTML = '';
            s.forEach(m => {
                const d = m.val();
                box.innerHTML += `<div class="bg-white/5 p-4 rounded-2xl border-l-2 border-pink-500/30">
                    <span class="text-[10px] text-pink-500 font-bold block mb-1 uppercase">${d.user}</span>
                    <p class="text-sm text-white/80">${d.text}</p>
                </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });

        function initObserver() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) { 
                        if(!v.src) v.src = v.dataset.src;
                        v.muted = isMuted;
                        v.play().catch(()=>{});
                    } else { v.pause(); }
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.video-segment').forEach(s => obs.observe(s));
        }

        // ==================== ملء الشاشة ====================
        document.addEventListener('click', function requestFullScreen() {
            document.documentElement.requestFullscreen?.();
            document.removeEventListener('click', requestFullScreen);
        }, { once: true });
        
        // ==================== اختبار الاتصال ====================
        db.ref(".info/connected").on("value", (snap) => {
            if (snap.val() === true) {
                console.log("✅ متصل بقاعدة البيانات");
            } else {
                console.log("❌ غير متصل بقاعدة البيانات");
            }
        });
        
    </script>
</body>
</html>
