<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XRAWS COMMUNITY | عبدالله جاسم</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Cairo:wght@400;700;900&display=swap');
        :root { --pink: #ff007f; --soft-pink: #fff0f5; }
        body { background: var(--soft-pink); font-family: 'Cairo', sans-serif; margin: 0; }
        header { 
            height: 70px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); 
            border-bottom: 2px solid var(--pink); position: fixed; width: 100%; top: 0; z-index: 1000;
            display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
        }
        .v-card { 
            background: white; border-radius: 30px; overflow: hidden; margin-bottom: 25px; 
            box-shadow: 0 15px 35px rgba(255, 0, 127, 0.08); width: 100%; max-width: 480px;
        }
        .user-avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--pink); object-fit: cover; cursor: pointer; }
        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); 
            z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(8px);
        }
        .auth-box { background: white; padding: 30px; border-radius: 30px; width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; border: 2px solid #ffe4e1; padding: 12px; border-radius: 15px; margin-bottom: 15px; text-align: center; }
        .btn-main { background: var(--pink); color: white; padding: 12px 25px; border-radius: 15px; font-weight: bold; width: 100%; border: none; cursor: pointer; }
        #upload-trigger {
            position: fixed; bottom: 30px; left: 30px; width: 65px; height: 65px;
            background: var(--pink); color: white; border-radius: 50%; display: none;
            align-items: center; justify-content: center; font-size: 24px; z-index: 1500;
            box-shadow: 0 10px 20px rgba(255, 0, 127, 0.4);
        }
    </style>
</head>
<body class="pt-24 flex flex-col items-center pb-10">

    <header>
        <div class="text-pink-600 font-black text-2xl" style="font-family:Orbitron;">XRAWS</div>
        <div id="nav-user">
            <button onclick="toggleModal('auth-modal')" class="border-2 border-pink-500 text-pink-500 px-5 py-1.5 rounded-full font-bold">دخول</button>
        </div>
    </header>

    <main id="video-feed" class="w-full flex flex-col items-center px-4"></main>

    <div id="auth-modal" class="modal">
        <div class="auth-box">
            <h2 class="text-2xl font-black mb-6 text-pink-600">انضم إلينا 💖</h2>
            <input type="email" id="auth-email" placeholder="البريد الإلكتروني">
            <input type="password" id="auth-pass" placeholder="كلمة السر">
            <button onclick="handleAuth()" class="btn-main">دخول / تسجيل جديد</button>
            <button onclick="toggleModal('auth-modal')" class="mt-4 text-gray-400 block w-full text-center">إغلاق</button>
        </div>
    </div>

    <button id="upload-trigger"><i class="fas fa-plus"></i></button>

    <script>
        // إعدادات Firebase الخاصة بمشروع soko
        const firebaseConfig = {
            apiKey: "AIzaSyD93aEghXrgkTYRKnQ98rVe1Fu9NdngcxY",
            authDomain: "soko-7d03e.firebaseapp.com",
            databaseURL: "https://soko-7d03e-default-rtdb.firebaseio.com",
            projectId: "soko-7d03e",
            storageBucket: "soko-7d03e.firebasestorage.app",
            messagingSenderId: "636395398521",
            appId: "1:636395398521:web:fbd094bd35a2883fda3ba8"
        };

        const ADMIN_EMAIL = "jasim300v@gmail.com";

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        function toggleModal(id) {
            const m = document.getElementById(id);
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        auth.onAuthStateChanged(user => {
            const navUser = document.getElementById('nav-user');
            const upBtn = document.getElementById('upload-trigger');
            if (user) {
                navUser.innerHTML = `<img src="${user.photoURL || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="user-avatar" onclick="updateUserPic()">`;
                upBtn.style.display = 'flex';
                document.getElementById('auth-modal').style.display = 'none';
            } else {
                navUser.innerHTML = `<button onclick="toggleModal('auth-modal')" class="border-2 border-pink-500 text-pink-500 px-5 py-1.5 rounded-full font-bold">دخول</button>`;
                upBtn.style.display = 'none';
            }
        });

        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            try {
                await auth.signInWithEmailAndPassword(email, pass);
            } catch (err) {
                if (err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential') {
                    await auth.createUserWithEmailAndPassword(email, pass);
                } else { alert(err.message); }
            }
        }

        function updateUserPic() {
            const url = prompt("ضع رابط صورتك الشخصية:");
            if(url) auth.currentUser.updateProfile({ photoURL: url }).then(() => location.reload());
        }

        const widget = cloudinary.createUploadWidget({ cloudName: "dfscughol", uploadPreset: "update_vk" }, (err, res) => {
            if (res.event === "success") {
                db.ref('posts').push({
                    url: res.info.secure_url,
                    user: auth.currentUser.email.split('@')[0],
                    userPic: auth.currentUser.photoURL || 'https://cdn-icons-png.flaticon.com/512/149/149071.png',
                    userId: auth.currentUser.uid,
                    time: Date.now()
                });
            }
        });
        document.getElementById('upload-trigger').onclick = () => widget.open();

        db.ref('posts').on('value', snap => {
            const feed = document.getElementById('video-feed');
            feed.innerHTML = '';
            const data = snap.val();
            if(!data) return;
            Object.keys(data).reverse().forEach(id => {
                const p = data[id];
                const isAdmin = auth.currentUser && auth.currentUser.email === ADMIN_EMAIL;
                feed.innerHTML += `
                    <div class="v-card">
                        <div class="p-4 flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <img src="${p.userPic}" class="w-10 h-10 rounded-full">
                                <span class="font-bold text-gray-700">${p.user}</span>
                            </div>
                            ${isAdmin ? `<i class="fas fa-trash text-red-500 cursor-pointer" onclick="deletePost('${id}')"></i>` : ''}
                        </div>
                        <video src="${p.url}" controls class="w-full bg-black"></video>
                    </div>`;
            });
        });

        function deletePost(id) { if(confirm("حذف؟")) db.ref(`posts/${id}`).remove(); }
    </script>
</body>
</html>
