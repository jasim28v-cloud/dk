<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GENESIS | PRO EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Cairo:wght@400;700&display=swap');
        
        :root { --p: #ff0055; --bg: #000; --glass: rgba(255, 0, 85, 0.1); }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; }

        .main-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .main-feed::-webkit-scrollbar { display: none; }
        .section-slide { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; display: flex; flex-direction: column; }
        
        .video-box { position: relative; flex: 1; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        .left-controls { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; z-index: 100; }
        .side-btn { width: 55px; height: 55px; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); border-radius: 50%; border: 1px solid var(--p); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; }
        .side-btn:active { transform: scale(0.9); }
        .side-btn i { font-size: 1.5rem; color: #fff; filter: drop-shadow(0 0 5px var(--p)); }

        .heart-pop { position: absolute; pointer-events: none; color: var(--p); font-size: 3rem; animation: pop 0.8s ease-out forwards; z-index: 1000; text-shadow: 0 0 10px var(--p); }
        @keyframes pop { 0% { transform: scale(0); opacity: 1; } 100% { transform: translateY(-120px) scale(1.8); opacity: 0; } }

        .chat-area { height: 35vh; background: #0a0a0a; border-top: 1px solid rgba(255,0,85,0.2); display: flex; flex-direction: column; }
        .chat-msgs { flex: 1; overflow-y: auto; padding: 10px; font-size: 13px; scroll-behavior: smooth; }
        .msg { background: rgba(255,255,255,0.03); padding: 8px 12px; border-radius: 12px; margin-bottom: 6px; border-right: 3px solid var(--p); animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
        
        .chat-input { padding: 12px; display: flex; gap: 10px; background: #000; border-top: 1px solid #1a1a1a; }
        .chat-input input { flex: 1; background: #111; border: 1px solid #333; padding: 10px 15px; border-radius: 25px; color: #fff; outline: none; }

        /* لوحة التحكم الاحترافية */
        #admin { display: none; position: fixed; inset: 0; z-index: 5000; background: linear-gradient(to bottom, #000, #1a000a); padding: 25px; overflow-y: auto; }
        .admin-card { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--p); border-radius: 20px; padding: 20px; margin-bottom: 25px; box-shadow: 0 0 20px rgba(255,0,85,0.2); }
        .admin-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .thumb { aspect-ratio: 9/16; background: #111; border-radius: 15px; overflow: hidden; position: relative; border: 1px solid #333; }
        .del-btn { position: absolute; bottom: 8px; right: 8px; background: var(--p); width: 35px; height: 35px; border-radius: 10px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-around; align-items: center; z-index: 1000; border-top: 1px solid #222; }
        .upload-btn-main { width: 60px; height: 50px; background: linear-gradient(45deg, var(--p), #ff5e00); border-radius: 18px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px var(--p); }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full p-5 z-[1000] flex justify-between items-center pointer-events-none">
        <div class="font-[Orbitron] text-p text-2xl font-black pointer-events-auto" style="color:var(--p); text-shadow: 0 0 10px var(--p);">GENESIS</div>
        <div class="w-10 h-10 rounded-full bg-black/50 border border-white/10 flex items-center justify-center pointer-events-auto" onclick="toggleAdmin()">
            <i class="fas fa-sliders-h text-pink-500"></i>
        </div>
    </header>

    <main class="main-feed" id="v-feed"></main>

    <nav class="nav-bar">
        <i class="fas fa-home text-xl opacity-40"></i>
        <div class="upload-btn-main" id="upload-action-btn"><i class="fas fa-plus text-white text-2xl"></i></div>
        <i class="fas fa-user-shield text-xl opacity-40" onclick="toggleAdmin()"></i>
    </nav>

    <div id="admin">
        <div class="flex justify-between items-center mb-6">
            <h2 class="font-[Orbitron] text-pink-500 text-xl tracking-widest">DASHBOARD</h2>
            <i class="fas fa-times-circle text-3xl text-white/50" onclick="toggleAdmin()"></i>
        </div>

        <div class="admin-card">
            <p class="text-sm text-gray-400 mb-4 text-center">انقر على الزر أدناه لإضافة محتوى جديد للسديم</p>
            <button onclick="openWidget()" class="w-full bg-pink-600 py-4 rounded-xl font-bold flex items-center justify-center gap-3 active:scale-95 transition-all">
                <i class="fas fa-cloud-upload-alt"></i> رفع فيديو جديد
            </button>
        </div>

        <h3 class="mb-4 font-bold text-gray-300">الفيديوهات الحالية:</h3>
        <div id="v-grid" class="admin-grid pb-24"></div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://project-717e4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myId = 'GNS_' + Math.random().toString(36).substr(2, 3).toUpperCase();

        // دالة الرفع المستقلة لضمان العمل
        const widget = cloudinary.createUploadWidget({
            cloudName: "dssk5tabb",
            uploadPreset: "bjebvo5p"
        }, (error, result) => {
            if (!error && result && result.event === "success") {
                db.ref('videos').push({
                    url: result.info.secure_url,
                    likes: 0,
                    time: Date.now()
                });
                alert("تم الرفع بنجاح!");
            }
        });

        function openWidget() { widget.open(); }
        document.getElementById('upload-action-btn').onclick = openWidget;

        // جلب الفيديوهات
        db.ref('videos').on('value', (s) => {
            const feed = document.getElementById('v-feed');
            const grid = document.getElementById('v-grid');
            const data = s.val();
            if(!data) {
                feed.innerHTML = '<div class="h-full flex items-center justify-center opacity-30">لا يوجد محتوى</div>';
                return;
            }

            let h = ''; let g = '';
            Object.keys(data).reverse().forEach(id => {
                const v = data[id];
                h += `
                <section class="section-slide">
                    <div class="video-box" ondblclick="handleDblClick(event, '${id}')">
                        <video loop playsinline src="${v.url}" onclick="this.paused?this.play():this.pause()"></video>
                        <div class="left-controls">
                            <div class="side-btn" onclick="like('${id}')"><i class="fas fa-heart"></i><span class="count-tag">${v.likes || 0}</span></div>
                            <div class="side-btn" onclick="share()"><i class="fas fa-share-alt"></i></div>
                        </div>
                    </div>
                    <div class="chat-area">
                        <div class="chat-msgs" id="msgs-${id}"></div>
                        <div class="chat-input">
                            <input type="text" id="in-${id}" placeholder="دردشة حية..." onkeydown="if(event.key==='Enter') send('${id}')">
                            <button onclick="send('${id}')" class="text-pink-500 font-bold px-3"><i class="fas fa-paper-plane"></i></button>
                        </div>
                    </div>
                </section>`;
                g += `
                <div class="thumb">
                    <video src="${v.url}#t=1" muted></video>
                    <div class="del-btn" onclick="del('${id}')"><i class="fas fa-trash-alt text-white"></i></div>
                </div>`;
            });
            feed.innerHTML = h;
            grid.innerHTML = g;
            initObs();
            Object.keys(data).forEach(id => listenChat(id));
        });

        function handleDblClick(e, id) {
            like(id);
            const heart = document.createElement('i');
            heart.className = 'fas fa-heart heart-pop';
            heart.style.left = (e.clientX - 30) + 'px';
            heart.style.top = (e.clientY - 30) + 'px';
            e.currentTarget.appendChild(heart);
            setTimeout(() => heart.remove(), 800);
        }

        function listenChat(id) {
            db.ref(`chats/${id}`).limitToLast(15).on('value', s => {
                const mBox = document.getElementById(`msgs-${id}`);
                if(!mBox) return;
                let h = '';
                s.forEach(child => {
                    const m = child.val();
                    h += `<div class="msg"><b>${m.u}:</b> ${m.t}</div>`;
                });
                mBox.innerHTML = h;
                mBox.scrollTop = mBox.scrollHeight;
            });
        }

        function send(id) {
            const i = document.getElementById(`in-${id}`);
            if(!i.value.trim()) return;
            db.ref(`chats/${id}`).push({ u: myId, t: i.value });
            i.value = '';
        }

        function initObs() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) v?.play().catch(()=>{});
                    else v?.pause();
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.section-slide').forEach(s => obs.observe(s));
        }

        function toggleAdmin() { const a = document.getElementById('admin'); a.style.display = a.style.display==='block'?'none':'block'; }
        function like(id) { db.ref(`videos/${id}/likes`).transaction(c => (c || 0) + 1); }
        function del(id) { if(confirm('حذف هذا الفيديو نهائياً؟')) db.ref(`videos/${id}`).remove(); }
        function share() { if(navigator.share) navigator.share({url: window.location.href}); }
    </script>
</body>
</html>
