<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RΞD_VØID | NANO-GENESIS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Cairo:wght@300;700&display=swap');
        
        :root { 
            --nano-red: #ff0000;
            --ultra-black: #020000;
            --plasma-glow: rgba(255, 0, 0, 0.15);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--ultra-black); color: #fff; 
            overflow: hidden; font-family: 'Cairo', sans-serif;
        }

        /* محرك الجزيئات النانوية في الخلفية */
        #nano-canvas {
            position: fixed; top: 0; left: 0; z-index: -1;
            filter: blur(1px); opacity: 0.6;
        }

        .scroll-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .scroll-engine::-webkit-scrollbar { display: none; }
        
        /* واجهة الفيديو الـ Ultra */
        .video-segment { 
            height: 100vh; width: 100vw; scroll-snap-align: start; 
            position: relative; display: flex; align-items: center; justify-content: center;
        }
        
        video { 
            width: 100%; height: 100%; object-fit: cover;
            mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
        }

        /* أزرار مستقبلية بتصميم نانوي */
        .nano-glass { 
            background: rgba(10, 0, 0, 0.7);
            backdrop-filter: blur(40px) saturate(200%);
            border: 1px solid rgba(255, 0, 0, 0.1);
            border-radius: 24px;
            box-shadow: inset 0 0 15px rgba(255, 0, 0, 0.05);
        }

        .side-controls { 
            position: absolute; left: 20px; bottom: 150px; 
            display: flex; flex-direction: column; gap: 25px; z-index: 100;
        }

        .nano-btn {
            width: 62px; height: 62px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative;
            transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .nano-btn i { font-size: 22px; filter: drop-shadow(0 0 8px var(--nano-red)); }

        /* زر الرفع النانوي */
        #upload-trigger {
            background: radial-gradient(circle at center, #ff0000 0%, #440000 100%);
            width: 70px; height: 70px; border-radius: 22px;
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.3);
            transform: translateY(-10px) rotate(45deg);
        }
        #upload-trigger i { transform: rotate(-45deg); }

        /* شريط التنقل السفلي الحديث */
        .bottom-nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 450px; height: 85px; z-index: 1000;
            display: flex; justify-content: space-around; align-items: center;
            padding: 0 15px;
        }

        .active-glow {
            position: absolute; bottom: 0; width: 40px; height: 4px;
            background: var(--nano-red); box-shadow: 0 0 20px var(--nano-red);
            border-radius: 10px; transition: 0.5s ease;
        }

        /* التنبيهات النانوية */
        #nano-toast {
            position: fixed; bottom: 130px; left: 50%; transform: translateX(-50%);
            padding: 8px 20px; border: 1px solid var(--nano-red);
            background: rgba(0,0,0,0.8); border-radius: 10px;
            font-family: 'Orbitron'; font-size: 10px; display: none; z-index: 2000;
        }
    </style>
</head>
<body>

    <canvas id="nano-canvas"></canvas>
    <div id="nano-toast">PROTOCOL_EXECUTED</div>

    <header class="fixed top-0 w-full z-[500] p-8 flex justify-between items-start pointer-events-none">
        <div class="pointer-events-auto">
            <h1 class="text-4xl font-black font-[Orbitron] text-red-600 tracking-tighter leading-none">RΞD</h1>
            <span class="text-[10px] font-[Orbitron] tracking-[0.6em] text-white/40">VØID_NANO_V4</span>
        </div>
        <div class="nano-glass p-3 px-5 text-[10px] font-[Orbitron] pointer-events-auto border-red-600/20">
            SYNC: <span class="text-green-500">LIVE</span>
        </div>
    </header>

    <main class="scroll-engine" id="video-stack">
        </main>

    <nav class="bottom-nav nano-glass">
        <div class="nano-btn" onclick="location.reload()"><i class="fa-solid fa-house-chimney-window opacity-50 hover:opacity-100"></i></div>
        <div class="nano-btn" onclick="toggleChat()"><i class="fa-solid fa-brain opacity-50 hover:opacity-100"></i></div>
        
        <div id="upload-trigger" class="flex items-center justify-center active:scale-90 transition-all cursor-pointer">
            <i class="fa-solid fa-plus text-2xl text-white"></i>
        </div>

        <div class="nano-btn" onclick="shareVideo()"><i class="fa-solid fa-dna opacity-50 hover:opacity-100"></i></div>
        <div class="nano-btn" onclick="openAd()"><i class="fa-solid fa-atom opacity-50 hover:opacity-100"></i></div>
    </nav>

    <div id="chat-overlay" class="fixed inset-0 z-[1100] hidden flex-col bg-black/95 backdrop-blur-3xl">
        <div class="p-10 flex justify-between items-center border-b border-red-900/20">
            <h2 class="font-[Orbitron] text-red-600 tracking-widest text-xl font-black">NEURAL_CHAT</h2>
            <i class="fa-solid fa-xmark text-3xl cursor-pointer" onclick="toggleChat()"></i>
        </div>
        <div id="chat-box" class="flex-1 p-8 overflow-y-auto"></div>
        <div class="p-8 bg-white/5 border-t border-red-900/20 flex gap-4">
            <input type="text" id="msg-input" class="flex-1 bg-transparent border-b-2 border-red-900 outline-none p-4 text-white" placeholder="Type transmission...">
            <button onclick="sendChat()" class="text-red-600 text-2xl"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        // --- تهيئة الجزيئات النانوية ---
        const canvas = document.getElementById('nano-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0; if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0; if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 0, 0, 0.5)';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }
        function initNano() { for (let i = 0; i < 100; i++) particles.push(new Particle()); }
        function animateNano() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateNano);
        }
        initNano(); animateNano();

        // --- الربط البرمجي (Firebase & Cloudinary) ---
        const firebaseConfig = { databaseURL: "https://xkom-a73e4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const UID = localStorage.getItem('v_uid') || 'UX_' + Math.random().toString(36).substr(2, 4).toUpperCase();
        localStorage.setItem('v_uid', UID);

        const AD_LINKS = [
            "https://www.effectivegatecpm.com/q7bf96ad4p?key=4272e67963ce67f1cfaeb4a56682d6ec",
            "https://www.effectivegatecpm.com/w6ejwgptb?key=b77b52a8f4f7e4cdd1ac7bccc1b04a4d"
        ];
        let adPtr = 0;

        function showToast(m) { 
            const t = document.getElementById('nano-toast'); 
            t.innerText = m; t.style.display = 'block'; 
            setTimeout(() => t.style.display = 'none', 2000); 
        }

        function openAd() { window.open(AD_LINKS[adPtr], '_blank'); adPtr = (adPtr + 1) % AD_LINKS.length; }

        // جلب الفيديوهات من vox_god
        db.ref('vox_god').on('value', (s) => {
            const container = document.getElementById('video-stack');
            const data = s.val();
            if(!data) return;
            container.innerHTML = '';
            Object.keys(data).reverse().forEach(id => {
                const v = data[id];
                const sec = document.createElement('section');
                sec.className = 'video-segment';
                sec.innerHTML = `
                    <video loop playsinline src="${v.url}"></video>
                    <div class="side-controls">
                        <div class="nano-btn nano-glass ${v.likedBy && v.likedBy[UID] ? 'text-red-600' : 'text-white/60'}" onclick="handleLike('${id}')">
                            <i class="fa-solid fa-heart-pulse"></i>
                            <span class="text-[10px] font-bold mt-1">${v.likes || 0}</span>
                        </div>
                        <div class="nano-btn nano-glass text-white/60" onclick="toggleChat()"><i class="fa-solid fa-comment-medical"></i></div>
                        <div class="nano-btn nano-glass text-white/60" onclick="shareVideo()"><i class="fa-solid fa-share-nodes"></i></div>
                    </div>
                `;
                container.appendChild(sec);
            });
            initObserver();
        });

        // الرفع النانوي (نظيف وبدون إعلانات)
        const widget = cloudinary.createUploadWidget({
            cloudName: "dqzjfaqg4", uploadPreset: "vox_god", resourceType: "video"
        }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('vox_god').push({ url: res.info.secure_url, sender: UID, likes: 0, ts: Date.now() });
                showToast("NODE_ADDED_SUCCESSFULLY");
            }
        });
        document.getElementById("upload-trigger").onclick = () => widget.open();

        function handleLike(id) {
            openAd();
            db.ref(`vox_god/${id}`).transaction(p => {
                if(p) {
                    if(!p.likedBy) p.likedBy = {};
                    if(p.likedBy[UID]) { p.likes--; delete p.likedBy[UID]; }
                    else { p.likes++; p.likedBy[UID] = true; showToast("SYNC_LIKE_COMPLETE"); }
                }
                return p;
            });
        }

        function toggleChat() { 
            const c = document.getElementById('chat-overlay');
            if(c.classList.contains('hidden')) openAd();
            c.classList.toggle('hidden'); c.classList.toggle('flex');
        }

        function shareVideo() { openAd(); navigator.share({url: window.location.href}); }

        function sendChat() {
            const i = document.getElementById('msg-input');
            if(i.value.trim()){ db.ref('global_chat').push({user:UID, text:i.value}); i.value=''; }
        }

        db.ref('global_chat').limitToLast(10).on('value', s => {
            const b = document.getElementById('chat-box'); b.innerHTML = '';
            s.forEach(c => {
                const m = c.val();
                const d = document.createElement('div');
                d.className = m.user === UID ? 'mb-6 text-left' : 'mb-6 text-right';
                d.innerHTML = `<span class="text-[9px] text-red-600 font-[Orbitron] block mb-2">${m.user}</span><p class="nano-glass inline-block p-4 text-sm max-w-[85%] border-red-900/20">${m.text}</p>`;
                b.appendChild(d);
            });
            b.scrollTop = b.scrollHeight;
        });

        function initObserver() {
            const obs = new IntersectionObserver(es => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting && v) v.play().catch(()=>{});
                    else if(v) v.pause();
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.video-segment').forEach(s => obs.observe(s));
        }

        document.addEventListener('click', () => { 
            document.querySelectorAll('video').forEach(v => v.muted = false); 
        }, { once: true });
    </script>
</body>
</html>
