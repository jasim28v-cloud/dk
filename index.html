<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GENESIS | NEON CORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;700&display=swap');
        :root { --neon-color: #00f3ff; --accent-gradient: linear-gradient(45deg, #00f3ff, #ff00ff); }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; transition: background 0.8s ease; }
        
        #preloader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-ring { width: 80px; height: 80px; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--neon-color); border-radius: 50%; animation: spin 1s linear infinite; box-shadow: 0 0 20px var(--neon-color); }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .scroll-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; position: relative; z-index: 10; }
        .scroll-engine::-webkit-scrollbar { display: none; }
        
        .video-segment { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; }
        .video-container { width: 100%; height: 100%; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        .middle-controls { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 25px; z-index: 100; }
        .icon-box { width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(15px); border: 1px solid var(--neon-color); transition: 0.3s; cursor: pointer; }
        .icon-box i { color: var(--neon-color); filter: drop-shadow(0 0 8px var(--neon-color)); }

        .glass-ui { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(30px); border-top: 1px solid rgba(255, 255, 255, 0.1); }
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 450px; height: 75px; border-radius: 30px; display: flex; justify-content: space-around; align-items: center; z-index: 500; border: 1px solid rgba(255, 255, 255, 0.1); }
        
        .upload-btn { width: 60px; height: 60px; background: var(--accent-gradient); color: #fff; border-radius: 20px; display: flex; align-items: center; justify-content: center; transform: translateY(-15px); box-shadow: 0 0 25px rgba(0, 243, 255, 0.5); cursor: pointer; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(-15px); } 50% { transform: translateY(-22px); } }

        #admin-overlay { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.98); padding: 25px; overflow-y: auto; }
        .admin-card { background: #111; border-radius: 15px; overflow: hidden; border: 1px solid #333; position: relative; height: 220px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .admin-card video { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .delete-btn { position: absolute; bottom: 10px; right: 10px; background: #ff0055; color: white; padding: 8px 15px; border-radius: 8px; font-size: 12px; font-weight: bold; }

        #upload-status { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 2000; background: var(--accent-gradient); padding: 10px 25px; border-radius: 50px; font-weight: bold; display: none; box-shadow: 0 0 20px var(--neon-color); }
    </style>
</head>
<body>

    <div id="upload-status">جاري الرفع إلى السحابة...</div>

    <div id="preloader">
        <div class="loader-ring"></div>
        <div class="loader-text mt-4 font-[Orbitron] text-cyan-400 animate-pulse">SYSTEM STARTING</div>
    </div>

    <header class="fixed top-0 w-full z-[200] glass-ui p-5 flex justify-between items-center border-b border-white/5">
        <div class="font-[Orbitron] text-xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-fuchsia-500" id="clock-display">00:00:00</div>
        <div class="flex items-center gap-2">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-ping"></span>
            <span class="text-[10px] font-[Orbitron] opacity-70">LIVE_SYNC</span>
        </div>
    </header>

    <div class="scroll-engine" id="video-stack"></div>

    <nav class="bottom-nav glass-ui">
        <div onclick="location.reload()" class="cursor-pointer text-xl opacity-60 hover:opacity-100 transition-all"><i class="fas fa-home"></i></div>
        <div onclick="toggleChat()" class="cursor-pointer text-xl opacity-60 hover:opacity-100 transition-all"><i class="fas fa-comment-alt"></i></div>
        <div id="upload-trigger" class="upload-btn"><i class="fas fa-cloud-upload-alt text-2xl"></i></div>
        <div onclick="checkAdmin()" class="cursor-pointer text-xl opacity-60 hover:opacity-100 transition-all"><i class="fas fa-shield-alt"></i></div>
        <div onclick="shareApp()" class="cursor-pointer text-xl opacity-60 hover:opacity-100 transition-all"><i class="fas fa-share-nodes"></i></div>
    </nav>

    <div id="admin-overlay">
        <div class="flex justify-between items-center mb-10 border-b border-white/10 pb-5">
            <div>
                <h2 class="font-[Orbitron] text-2xl text-cyan-400">CONTROL_PANEL</h2>
                <p class="text-[10px] text-gray-500">ادارة المحتوى السحابي</p>
            </div>
            <i class="fas fa-times-circle text-3xl cursor-pointer text-gray-400 hover:text-white" onclick="toggleAdmin()"></i>
        </div>
        <div id="admin-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-40"></div>
    </div>

    <script>
        const SHADOW_ID = localStorage.getItem('shadow_uid') || 'UX_' + Math.floor(Math.random()*9999);
        localStorage.setItem('shadow_uid', SHADOW_ID);

        const firebaseConfig = { databaseURL: "https://project-717e4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function checkAdmin() {
            const pass = prompt("أدخل رمز الوصول الآمن:");
            if(pass === "1234") {
                toggleAdmin();
            } else {
                alert("تم رفض الوصول. الرمز غير صحيح.");
            }
        }

        function toggleAdmin() {
            const a = document.getElementById('admin-overlay');
            a.style.display = (a.style.display === 'block') ? 'none' : 'block';
        }

        // تحسين الرفع مع حالة مرئية
        const widget = cloudinary.createUploadWidget({ 
            cloudName: "dssk5tabb", 
            uploadPreset: "bjebvo5p",
            clientAllowedFormats: ["mp4", "mov", "webm"],
            maxFileSize: 50000000, // 50MB
            styles: { palette: { window: "#000000", sourceBg: "#000000", windowBorder: "#00f3ff", tabIcon: "#00f3ff", inactiveTabIcon: "#555555", menuIcons: "#00f3ff", link: "#00f3ff", action: "#ff00ff", inProgress: "#00f3ff", complete: "#33ff00", error: "#ff0000", textDark: "#000000", textLight: "#ffffff" }}
        }, (err, res) => {
            if (res.event === "start") document.getElementById('upload-status').style.display = 'block';
            if (!err && res.event === "success") { 
                db.ref('videos/').push({ 
                    url: res.info.secure_url, 
                    sender: SHADOW_ID, 
                    likes: 0, 
                    thumb: res.info.thumbnail_url || res.info.secure_url.replace('.mp4', '.jpg'),
                    time: Date.now() 
                });
                document.getElementById('upload-status').textContent = "تم الرفع بنجاح! 🔥";
                setTimeout(() => document.getElementById('upload-status').style.display = 'none', 3000);
            }
        });

        document.getElementById("upload-trigger").onclick = () => widget.open();

        db.ref('videos').on('value', (snapshot) => {
            const container = document.getElementById('video-stack');
            const adminGrid = document.getElementById('admin-grid');
            const data = snapshot.val();
            container.innerHTML = ''; adminGrid.innerHTML = '';
            
            if(data) {
                Object.entries(data).reverse().forEach(([id, vid]) => {
                    // العرض الرئيسي
                    container.innerHTML += `
                        <section class="video-segment">
                            <div class="video-container">
                                <video loop playsinline preload="none" src="${vid.url}" onclick="this.paused?this.play():this.pause()"></video>
                                <div class="middle-controls">
                                    <div class="icon-box" onclick="like('${id}')"><i class="fas fa-heart"></i></div>
                                    <div class="icon-box" onclick="shareApp()"><i class="fas fa-paper-plane"></i></div>
                                </div>
                            </div>
                        </section>`;

                    // لوحة التحكم مع معاينة الفيديو
                    adminGrid.innerHTML += `
                        <div class="admin-card border-neon">
                            <video src="${vid.url}#t=1" muted></video>
                            <div class="absolute inset-0 bg-gradient-to-t from-black to-transparent p-4 flex flex-col justify-end">
                                <span class="text-[10px] text-cyan-400 font-[Orbitron] mb-2">${id}</span>
                                <button onclick="deleteVid('${id}')" class="delete-btn">حذف نهائي</button>
                            </div>
                        </div>`;
                });
            }
            initObserver();
        });

        function deleteVid(id) { if(confirm('هل أنت متأكد من مسح هذا المحتوى من السحابة؟')) db.ref(`videos/${id}`).remove(); }

        function initObserver() {
            const obs = new IntersectionObserver((entries) => {
                entries.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) {
                        v.play().catch(()=>{});
                        document.documentElement.style.setProperty('--neon-color', ['#00f3ff','#ff00ff','#00ff88'][Math.floor(Math.random()*3)]);
                    } else { v.pause(); }
                });
            }, {threshold: 0.8});
            document.querySelectorAll('.video-segment').forEach(s => obs.observe(s));
        }

        function updateClock() { document.getElementById('clock-display').textContent = new Date().toLocaleTimeString('en-GB'); }
        setInterval(updateClock, 1000);
        window.onload = () => setTimeout(() => document.getElementById('preloader').style.display = 'none', 1500);
    </script>
</body>
</html>
