<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RΞD_VØID | FULL CONTROL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;700&display=swap');
        :root { --neon: #ff0000; --glass: rgba(15, 0, 0, 0.85); --bg: #020000; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; }
        .scroll-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .scroll-engine::-webkit-scrollbar { display: none; }
        .video-segment { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .glass-ui { background: var(--glass); backdrop-filter: blur(30px); border: 1px solid rgba(255, 0, 0, 0.15); }
        .side-controls { position: absolute; left: 18px; bottom: 140px; display: flex; flex-direction: column; gap: 20px; z-index: 100; }
        .btn-action { width: 55px; height: 55px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        
        /* زر الحذف الأسطوري للمشرف */
        .admin-delete-btn {
            position: absolute; top: 25px; left: 25px; 
            background: rgba(255, 0, 0, 0.8); width: 45px; height: 45px;
            border-radius: 12px; display: none; align-items: center; justify-content: center;
            z-index: 500; cursor: pointer; box-shadow: 0 0 20px #ff0000;
        }

        #toast { position: fixed; top: 50px; left: 50%; transform: translateX(-50%); background: #ff0000; padding: 10px 20px; border-radius: 10px; z-index: 2000; display: none; font-family: 'Orbitron'; font-size: 12px; }
    </style>
</head>
<body>

    <div id="toast">SYSTEM_MSG</div>

    <header class="fixed top-0 w-full z-[250] p-6 flex justify-between items-center bg-gradient-to-b from-black to-transparent pointer-events-none">
        <div class="pointer-events-auto">
            <h1 class="text-3xl font-black font-[Orbitron] text-red-600 tracking-tighter" style="text-shadow: 0 0 10px #ff0000;">RΞD_VØID</h1>
            <span id="status-tag" class="text-[8px] text-white/40 font-[Orbitron] tracking-widest">STATION_V4_READY</span>
        </div>
    </header>

    <main class="scroll-engine" id="video-stack">
        <div class="h-full flex flex-col items-center justify-center text-red-600 font-[Orbitron]">INIT_VOX_STREAMS...</div>
    </main>

    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-[440px] h-20 glass-ui rounded-[2.5rem] flex justify-around items-center z-[300]">
        <i class="fas fa-home opacity-40 hover:opacity-100 text-xl cursor-pointer" onclick="location.reload()"></i>
        <i class="fas fa-comment-dots opacity-40 hover:opacity-100 text-xl cursor-pointer" onclick="toggleChat()"></i>
        <div id="upload-trigger" class="w-16 h-16 bg-red-600 rounded-2xl flex items-center justify-center transform -translate-y-4 shadow-xl cursor-pointer"><i class="fas fa-plus text-2xl"></i></div>
        <i class="fas fa-share-alt opacity-40 hover:opacity-100 text-xl cursor-pointer" onclick="shareVideo()"></i>
        <i class="fas fa-fingerprint opacity-40 hover:opacity-100 text-xl cursor-pointer" onclick="adminLockCheck()"></i>
    </nav>

    <div id="chat-overlay" class="fixed inset-0 z-[1000] hidden flex-col bg-black/98 backdrop-blur-3xl">
        <div class="p-8 border-b border-red-950 flex justify-between items-center">
            <h2 class="text-red-600 font-[Orbitron] tracking-widest text-lg">NEXUS_CHAT</h2>
            <i class="fas fa-times text-2xl cursor-pointer" onclick="toggleChat()"></i>
        </div>
        <div id="chat-box" class="flex-1 p-6 overflow-y-auto space-y-4"></div>
        <div class="p-6 flex gap-3"><input type="text" id="msg-input" class="flex-1 bg-white/5 border border-red-900/30 rounded-xl p-4 text-white" placeholder="Message..."><button onclick="sendChat()" class="bg-red-600 px-6 rounded-xl">SEND</button></div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://xkom-a73e4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const UID = localStorage.getItem('v_uid') || 'U_' + Math.floor(Math.random()*9999);
        localStorage.setItem('v_uid', UID);

        let isAdmin = false;
        let tapCount = 0;

        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000); }

        // نظام المشرف لتفعيل الحذف
        function adminLockCheck() {
            tapCount++;
            if(tapCount >= 5) {
                if(prompt("ENTER OVERLORD CODE:") === "vox77") {
                    isAdmin = true;
                    document.getElementById('status-tag').innerText = "OVERLORD_ACTIVE";
                    document.getElementById('status-tag').style.color = "#00ff00";
                    showToast("ADMIN_MODE_ENABLED");
                    renderVideos();
                }
                tapCount = 0;
            } else { showToast(`TAPS: ${tapCount}/5`); }
        }

        function renderVideos() {
            db.ref('vox_god').on('value', (s) => {
                const stack = document.getElementById('video-stack');
                const data = s.val();
                if(!data) return;
                stack.innerHTML = '';
                Object.keys(data).reverse().forEach(id => {
                    const v = data[id];
                    const sec = document.createElement('section');
                    sec.className = 'video-segment';
                    sec.innerHTML = `
                        <video loop playsinline src="${v.url}"></video>
                        ${isAdmin ? `<div class="admin-delete-btn" style="display:flex" onclick="deleteNode('${id}')"><i class="fas fa-trash"></i></div>` : ''}
                        <div class="side-controls">
                            <div class="btn-action glass-ui ${v.likedBy && v.likedBy[UID] ? 'text-red-600' : ''}" onclick="likeNode('${id}')">
                                <i class="fas fa-heart"></i><span class="text-[10px] mt-1">${v.likes || 0}</span>
                            </div>
                            <div class="btn-action glass-ui" onclick="toggleChat()"><i class="fas fa-comment"></i></div>
                        </div>
                    `;
                    stack.appendChild(sec);
                });
                initObserver();
            });
        }

        function deleteNode(id) { if(confirm("حذف الفيديو نهائياً؟")) db.ref(`vox_god/${id}`).remove(); }

        const widget = cloudinary.createUploadWidget({
            cloudName: "dqzjfaqg4", uploadPreset: "vox_god", resourceType: "video"
        }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('vox_god').push({ url: res.info.secure_url, sender: UID, likes: 0 });
            }
        });
        document.getElementById("upload-trigger").onclick = () => widget.open();

        function likeNode(id) {
            window.open("https://www.effectivegatecpm.com/q7bf96ad4p?key=4272e67963ce67f1cfaeb4a56682d6ec", '_blank');
            db.ref(`vox_god/${id}`).transaction(p => {
                if(p) {
                    if(!p.likedBy) p.likedBy = {};
                    if(p.likedBy[UID]) { p.likes--; delete p.likedBy[UID]; }
                    else { p.likes++; p.likedBy[UID] = true; }
                } return p;
            });
        }

        function toggleChat() { 
            const c = document.getElementById('chat-overlay');
            if(c.classList.contains('hidden')) window.open("https://www.effectivegatecpm.com/w6ejwgptb?key=b77b52a8f4f7e4cdd1ac7bccc1b04a4d", '_blank');
            c.classList.toggle('hidden'); c.classList.toggle('flex');
        }

        function shareVideo() { navigator.share({url: location.href}); }

        function sendChat() {
            const i = document.getElementById('msg-input');
            if(i.value.trim()){ db.ref('global_chat').push({user:UID, text:i.value}); i.value=''; }
        }

        db.ref('global_chat').limitToLast(10).on('value', s => {
            const b = document.getElementById('chat-box'); b.innerHTML = '';
            s.forEach(c => {
                const m = c.val();
                const d = document.createElement('div');
                d.className = m.user === UID ? 'text-left' : 'text-right';
                d.innerHTML = `<p class="inline-block p-3 bg-white/5 rounded-lg text-sm border border-red-900/20">${m.text}</p>`;
                b.appendChild(d);
            });
            b.scrollTop = b.scrollHeight;
        });

        function initObserver() {
            const obs = new IntersectionObserver(es => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting && v) v.play().catch(()=>{});
                    else if(v) v.pause();
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.video-segment').forEach(s => obs.observe(s));
        }

        document.addEventListener('click', () => { document.querySelectorAll('video').forEach(v => v.muted = false); }, { once: true });
        renderVideos();
    </script>
</body>
</html>
