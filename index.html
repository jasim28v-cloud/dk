<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHΔDØW PRO | TRENDS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;700&display=swap');
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; }
        .scroll-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .scroll-engine::-webkit-scrollbar { display: none; }
        .video-segment { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .glass-header { position: fixed; top: 0; width: 100%; z-index: 100; background: rgba(0,0,0,0.4); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.05); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .side-controls { position: absolute; left: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 15px; z-index: 50; }
        .glass-btn { width: 50px; height: 50px; background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; cursor: pointer; }
        .glass-btn.active { color: #ff0055; border-color: #ff0055; box-shadow: 0 0 15px rgba(255,0,85,0.3); }
        .glass-btn span { font-size: 9px; font-family: 'Orbitron'; margin-top: 2px; }
        .glass-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; height: 60px; background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .main-upload-btn { width: 45px; height: 45px; background: linear-gradient(135deg, #00f3ff, #0077ff); border-radius: 14px; display: flex; align-items: center; justify-content: center; color: #000; box-shadow: 0 0 15px rgba(0, 243, 255, 0.4); }
        .trending-badge { position: absolute; top: 85px; right: 20px; background: rgba(255, 215, 0, 0.2); border: 1px solid #ffd700; color: #ffd700; padding: 2px 8px; border-radius: 5px; font-size: 10px; font-family: 'Orbitron'; z-index: 40; }
        #chat-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); z-index: 200; display: none; flex-direction: column; }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { background: rgba(255,255,255,0.05); padding: 8px 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .chat-input-area { padding: 20px; background: rgba(0,0,0,0.5); border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 10px; }
        #msg-input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,243,255,0.3); border-radius: 10px; padding: 10px; color: #fff; outline: none; }
    </style>
</head>
<body>

    <header class="glass-header">
        <div class="flex items-center gap-2">
            <i class="fas fa-fire-alt text-orange-500"></i>
            <span class="text-[10px] font-bold font-[Orbitron] text-orange-400">TRENDING_MODE</span>
        </div>
        <h1 class="text-xl font-black italic font-[Orbitron]">SHΔDØW</h1>
        <div onclick="openAd(); alert('Your ID: ' + SHADOW_ID)" class="cursor-pointer">
            <i class="fas fa-user-shield text-cyan-400"></i>
        </div>
    </header>

    <main class="scroll-engine" id="video-stack">
        <div class="h-full flex flex-col items-center justify-center gap-3">
            <i class="fas fa-sync fa-spin text-cyan-500 text-2xl"></i>
            <span class="text-[9px] font-[Orbitron] opacity-40">SYNCING_TRENDS...</span>
        </div>
    </main>

    <div id="chat-overlay">
        <div class="p-4 flex justify-between items-center border-b border-white/10">
            <span class="font-[Orbitron] text-cyan-400">GLOBAL_COMMUNICATIONS</span>
            <i class="fas fa-times cursor-pointer p-2" onclick="toggleChat()"></i>
        </div>
        <div id="chat-box"></div>
        <div class="chat-input-area">
            <input type="text" id="msg-input" placeholder="Type message..." onkeypress="handleKey(event)">
            <button onclick="sendChat()" class="text-cyan-400 p-2"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <nav class="glass-nav">
        <i class="fas fa-house-user text-cyan-400 text-lg"></i>
        <i class="fas fa-comment-dots text-xl opacity-30 cursor-pointer" onclick="toggleChat()"></i>
        <div id="upload-trigger" class="main-upload-btn"><i class="fas fa-plus"></i></div>
        <i class="fas fa-share-nodes opacity-30 cursor-pointer" onclick="shareVideo()"></i>
        <i class="fas fa-fingerprint opacity-30" onclick="openAd();"></i>
    </nav>

    <script>
        const SHADOW_ID = localStorage.getItem('shadow_uid') || 'GHOST_' + Math.random().toString(36).substr(2, 4).toUpperCase();
        localStorage.setItem('shadow_uid', SHADOW_ID);

        const firebaseConfig = { databaseURL: "https://project-717e4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- محرك الأرباح المزدوج ---
        const AD_LINKS = [
            "https://10183.xml.4armn.com/direct-link?pubid=1003651&siteid=jasim-app",
            "https://11745.xml.4armn.com/direct-link?pubid=1003651&siteid=jasim-app"
        ];
        let currentAd = 0;
        function openAd() {
            window.open(AD_LINKS[currentAd], '_blank');
            currentAd = (currentAd + 1) % AD_LINKS.length;
        }

        function shareVideo() { openAd(); if (navigator.share) { navigator.share({ title: 'Shadow Pro', url: window.location.href }); } }

        const CLOUD_NAME = "dssk5tabb", UPLOAD_PRESET = "bjebvo5p";
        const myWidget = cloudinary.createUploadWidget({ cloudName: CLOUD_NAME, uploadPreset: UPLOAD_PRESET, sources: ['local'] }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('videos/').push({ url: res.info.secure_url, sender: SHADOW_ID, likes: 0, timestamp: Date.now() });
            }
        });
        document.getElementById("upload-trigger").addEventListener("click", () => { openAd(); myWidget.open(); });

        // --- محرك التريند الذكي ---
        db.ref('videos').on('value', (snapshot) => {
            const container = document.getElementById('video-stack');
            const data = snapshot.val();
            if(!data) return;
            
            // تحويل البيانات لمصفوفة وفرزها حسب اللايكات (التريند)
            const sortedVideos = Object.keys(data).map(id => ({ id, ...data[id] }))
                                 .sort((a, b) => (b.likes || 0) - (a.likes || 0));

            container.innerHTML = '';
            sortedVideos.forEach((vid, index) => {
                const section = document.createElement('section');
                section.className = 'video-segment';
                section.innerHTML = `
                    <video loop playsinline src="${vid.url}"></video>
                    ${index < 3 ? `<div class="trending-badge"><i class="fas fa-trophy mr-1"></i> TOP ${index + 1}</div>` : ''}
                    <div class="side-controls">
                        <div class="glass-btn ${vid.likedBy && vid.likedBy[SHADOW_ID] ? 'active' : ''}" onclick="toggleLike('${vid.id}')">
                            <i class="fas fa-heart"></i>
                            <span>${vid.likes || 0}</span>
                        </div>
                        <div class="glass-btn" onclick="toggleChat()">
                            <i class="fas fa-comment-dots"></i>
                            <span>CHAT</span>
                        </div>
                        <div class="glass-btn" onclick="shareVideo()">
                            <i class="fas fa-share-nodes"></i>
                            <span>SEND</span>
                        </div>
                    </div>
                    <div class="absolute bottom-[100px] right-5 font-[Orbitron] text-[10px] text-cyan-400/60 border-r border-cyan-400 pr-2">@${vid.sender}</div>
                `;
                container.appendChild(section);
            });
            initScroll();
        });

        function toggleChat() {
            const overlay = document.getElementById('chat-overlay');
            if (overlay.style.display !== 'flex') openAd();
            overlay.style.display = overlay.style.display === 'flex' ? 'none' : 'flex';
        }

        function toggleLike(vId) {
            openAd();
            db.ref(`videos/${vId}`).transaction(post => {
                if (post) {
                    if (!post.likedBy) post.likedBy = {};
                    if (post.likedBy[SHADOW_ID]) { post.likes--; delete post.likedBy[SHADOW_ID]; }
                    else { post.likes++; post.likedBy[SHADOW_ID] = true; }
                }
                return post;
            });
        }

        function sendChat() {
            const input = document.getElementById('msg-input');
            if(input.value.trim() === '') return;
            db.ref('global_chat').push({ user: SHADOW_ID, text: input.value, time: Date.now() });
            input.value = '';
        }
        function handleKey(e) { if(e.key === 'Enter') sendChat(); }
        db.ref('global_chat').limitToLast(15).on('value', (s) => {
            const box = document.getElementById('chat-box'); box.innerHTML = '';
            const val = s.val();
            if(val) Object.values(val).forEach(m => {
                const d = document.createElement('div');
                d.className = 'message';
                d.innerHTML = `<span class="text-[9px] text-cyan-400 block font-[Orbitron]">${m.user}</span><span class="text-sm">${m.text}</span>`;
                box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
        });

        function initScroll() {
            const obs = new IntersectionObserver((entries) => {
                entries.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) v.play().catch(()=>{});
                    else { v.pause(); v.currentTime = 0; }
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.video-segment').forEach(s => obs.observe(s));
        }
        document.addEventListener('click', () => { document.querySelectorAll('video').forEach(v => v.muted = false); }, { once: true });
    </script>
</body>
</html>
