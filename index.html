<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>VØID_X | NEBULA EDGE</title>
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Cairo:wght@300;500;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-hue: 330;
            --neon: hsl(330, 100%, 50%);
            --neon-glow: hsla(330, 100%, 50%, 0.3);
            --bg: #050002;
            --glass: rgba(255, 255, 255, 0.03);
            --transition-speed: 0.6s;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background: var(--bg);
            color: #fff;
            overflow: hidden;
            font-family: 'Cairo', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* خلفية ديناميكية متطورة */
        .nebula-bg {
            position: fixed;
            inset: 0;
            z-index: -2;
            background: radial-gradient(circle at 50% 50%, 
                hsla(var(--primary-hue), 100%, 8%, 1) 0%, 
                #000 100%);
            transition: background 1s ease;
        }

        .particle-field {
            position: fixed;
            inset: 0;
            z-index: -1;
            opacity: 0.4;
            background-image: 
                radial-gradient(circle at 20% 30%, hsla(var(--primary-hue), 100%, 50%, 0.08) 0%, transparent 30%),
                radial-gradient(circle at 80% 70%, hsla(calc(var(--primary-hue) + 60), 100%, 50%, 0.08) 0%, transparent 40%);
            animation: particleFloat 20s infinite alternate;
        }

        @keyframes particleFloat {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-20px, -30px) scale(1.1); }
        }

        /* محرك التمرير الرئيسي */
        .scroll-engine { 
            height: 100vh; 
            width: 100vw;
            overflow-y: scroll; 
            scroll-snap-type: y mandatory; 
            scrollbar-width: none;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        
        .scroll-engine::-webkit-scrollbar { 
            display: none; 
        }
        
        /* شريحة الفيديو - ملء الشاشة الكامل */
        .video-segment { 
            height: 100vh; 
            width: 100vw; 
            scroll-snap-align: start; 
            scroll-snap-stop: always; 
            position: relative; 
            overflow: hidden;
            background: #000;
        }

        .video-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover;
            pointer-events: none;
        }

        /* شريط تقدم الفيديو */
        .video-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(255,255,255,0.1);
            z-index: 50;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--neon);
            box-shadow: 0 0 15px var(--neon);
            transition: width 0.1s linear;
        }

        /* شعار VØID المتحرك */
        .cyber-mark {
            position: absolute;
            top: 15%;
            right: 5%;
            font-family: 'Orbitron';
            font-size: clamp(0.7rem, 3vw, 1rem);
            color: rgba(255,255,255,0.12);
            z-index: 20;
            letter-spacing: 6px;
            animation: cyberFloat 8s infinite ease-in-out;
            text-shadow: 0 0 20px var(--neon);
            pointer-events: none;
        }

        @keyframes cyberFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); opacity: 0.15; }
            50% { transform: translate(-30px, 50px) rotate(2deg); opacity: 0.3; }
        }

        /* الهيدر الزجاجي */
        .glass-header {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }

        .brand-pill {
            padding: 10px 28px;
            border-radius: 40px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-left: 4px solid var(--neon);
            pointer-events: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.4s;
        }

        .brand-pill:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px hsla(var(--primary-hue), 100%, 30%, 0.2);
        }

        .brand-name {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            letter-spacing: 3px;
            color: #fff;
            text-shadow: 0 0 20px var(--neon);
            font-size: 1.1rem;
        }

        .time-capsule {
            padding: 10px 20px;
            border-radius: 40px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            font-family: 'Orbitron';
            font-size: 0.8rem;
            color: rgba(255,255,255,0.8);
            pointer-events: auto;
        }

        /* الأزرار الجانبية */
        .action-cluster {
            position: absolute;
            left: 20px;
            bottom: 160px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 100;
        }

        .glass-action {
            width: 58px;
            height: 58px;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .glass-action::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 30%, hsla(var(--primary-hue), 100%, 70%, 0.3), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .glass-action:hover::before {
            opacity: 1;
        }

        .glass-action i {
            font-size: 1.5rem;
            color: var(--neon);
            filter: drop-shadow(0 0 10px var(--neon));
            transition: all 0.3s;
            z-index: 1;
        }

        .glass-action:hover i {
            transform: scale(1.15);
        }

        .action-label {
            font-size: 9px;
            font-weight: 700;
            margin-top: 3px;
            color: #fff;
            opacity: 0.8;
            font-family: 'Orbitron';
            letter-spacing: 0.5px;
            z-index: 1;
        }

        .like-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--neon);
            color: #000;
            font-size: 8px;
            font-weight: 900;
            padding: 2px 6px;
            border-radius: 20px;
            font-family: 'Orbitron';
            box-shadow: 0 0 15px var(--neon);
        }

        /* شريط التنقل السفلي */
        .nav-bar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 420px;
            height: 80px;
            border-radius: 40px;
            background: rgba(10, 0, 5, 0.4);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 200;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 0 1px hsla(var(--primary-hue), 100%, 50%, 0.1);
        }

        .nav-item {
            color: rgba(255,255,255,0.4);
            transition: all 0.3s;
            cursor: pointer;
            padding: 10px;
        }

        .nav-item:hover {
            color: var(--neon);
            filter: drop-shadow(0 0 10px var(--neon));
        }

        /* زر الرفع المبهر */
        .upload-nexus {
            background: var(--neon);
            box-shadow: 0 0 40px var(--neon), inset 0 0 20px rgba(255,255,255,0.3);
            cursor: pointer;
            width: 75px;
            height: 75px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translateY(-20px);
            border: 3px solid rgba(255,255,255,0.3);
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
            overflow: hidden;
            animation: uploadPulse 2s infinite;
        }

        @keyframes uploadPulse {
            0%, 100% { box-shadow: 0 0 30px var(--neon), inset 0 0 15px rgba(255,255,255,0.2); }
            50% { box-shadow: 0 0 60px var(--neon), inset 0 0 25px rgba(255,255,255,0.5); }
        }

        .upload-nexus::after {
            content: '';
            position: absolute;
            inset: -50%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }

        .upload-nexus:hover::after {
            transform: translateX(100%);
        }

        .upload-nexus:hover {
            transform: translateY(-25px) scale(1.05);
        }

        .upload-nexus i {
            font-size: 2.2rem;
            color: #fff;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3));
            z-index: 1;
        }

        /* نافذة إدخال الرابط */
        .upload-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(5, 0, 2, 0.98);
            backdrop-filter: blur(40px);
            padding: 35px;
            border-radius: 40px;
            z-index: 1000;
            border: 1px solid hsla(var(--primary-hue), 100%, 50%, 0.5);
            width: 90%;
            max-width: 420px;
            display: none;
            flex-direction: column;
            gap: 25px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 0 1px hsla(var(--primary-hue), 100%, 50%, 0.2);
            opacity: 0;
            transition: all 0.3s;
        }

        .upload-modal.active {
            display: flex;
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .modal-title {
            font-family: 'Orbitron';
            font-size: 1.4rem;
            color: var(--neon);
            text-align: center;
            letter-spacing: 2px;
            text-shadow: 0 0 20px var(--neon);
        }

        .url-input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 16px 20px;
            border-radius: 20px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s;
            font-family: 'Cairo';
        }

        .url-input:focus {
            border-color: var(--neon);
            box-shadow: 0 0 20px hsla(var(--primary-hue), 100%, 50%, 0.2);
        }

        .upload-btn {
            background: var(--neon);
            border: none;
            padding: 16px;
            border-radius: 20px;
            color: #fff;
            font-weight: bold;
            font-family: 'Orbitron';
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 0 30px var(--neon);
            transition: all 0.3s;
            letter-spacing: 2px;
        }

        .upload-btn:hover {
            transform: scale(0.98);
            box-shadow: 0 0 50px var(--neon);
        }

        /* شريط الحالة */
        .status-pill {
            position: fixed;
            bottom: 130px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
            padding: 10px 25px;
            border-radius: 40px;
            z-index: 300;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.75rem;
            border: 1px solid rgba(255,255,255,0.1);
            pointer-events: none;
            font-family: 'Orbitron';
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff4444;
            box-shadow: 0 0 15px currentColor;
            animation: dotPulse 1.5s infinite;
        }

        @keyframes dotPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* تجاوب مع الشاشات الصغيرة */
        @media (max-width: 480px) {
            .glass-action {
                width: 50px;
                height: 50px;
            }
            .upload-nexus {
                width: 65px;
                height: 65px;
            }
        }
    </style>
</head>
<body>

    <div class="nebula-bg"></div>
    <div class="particle-field"></div>

    <!-- الهيدر -->
    <header class="glass-header">
        <div class="brand-pill">
            <span class="brand-name">VØID_X</span>
        </div>
        <div class="time-capsule" id="liveClock">00:00:00</div>
    </header>

    <!-- المحتوى الرئيسي -->
    <main class="scroll-engine" id="videoStack"></main>

    <!-- شريط الحالة -->
    <div class="status-pill">
        <span class="status-dot" id="connDot" style="background: #ff4444;"></span>
        <span id="connText">جاري الاتصال...</span>
        <span id="vidCounter" class="mr-auto opacity-60">0 فيديو</span>
    </div>

    <!-- نافذة الرفع -->
    <div class="upload-modal" id="uploadModal">
        <h3 class="modal-title">✦ UPLOAD SEQUENCE ✦</h3>
        <input type="text" id="videoUrlInput" placeholder="أدخل رابط الفيديو (MP4)" class="url-input" dir="ltr">
        <button onclick="uploadVideo()" class="upload-btn">
            <i class="fas fa-cloud-upload-alt ml-2"></i> INITIALIZE
        </button>
        <button onclick="toggleModal()" class="text-white/40 text-sm py-2 hover:text-white/80 transition">
            إلغاء
        </button>
        <p class="text-[10px] text-white/20 text-center">مثال: https://example.com/video.mp4</p>
    </div>

    <!-- شريط التنقل -->
    <nav class="nav-bar">
        <div class="nav-item" onclick="openAdmin()">
            <i class="fas fa-fingerprint text-2xl"></i>
        </div>
        <div class="upload-nexus" onclick="toggleModal()">
            <i class="fas fa-plus"></i>
        </div>
        <div class="nav-item" onclick="toggleChat()">
            <i class="fas fa-comment-dots text-2xl"></i>
        </div>
    </nav>

    <script>
        // ==================== التهيئة ====================
        const firebaseConfig = { databaseURL: "https://vexe-f6558-default-rtdb.firebaseio.com/" };
        
        let db;
        let firebaseReady = false;
        let currentHue = 330; // اللون الافتراضي (وردي)
        let isMuted = true;
        let globalVideos = null;
        const USER_ID = "VOID_" + Math.random().toString(36).substr(2, 6).toUpperCase();
        
        // تهيئة Firebase
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            console.log("✅ Firebase initialized");
        } catch (e) {
            console.error("❌ Firebase error:", e);
        }

        // ==================== حالة الاتصال ====================
        function updateConnectionStatus(connected) {
            const dot = document.getElementById('connDot');
            const text = document.getElementById('connText');
            if (connected) {
                dot.style.background = '#00ffaa';
                dot.style.boxShadow = '0 0 20px #00ffaa';
                text.textContent = 'متصل بـ NEXUS';
                firebaseReady = true;
            } else {
                dot.style.background = '#ff4444';
                dot.style.boxShadow = '0 0 20px #ff4444';
                text.textContent = 'غير متصل';
                firebaseReady = false;
            }
        }

        if (db) {
            db.ref(".info/connected").on("value", (snap) => {
                updateConnectionStatus(snap.val() === true);
            });
        }

        // ==================== الساعة ====================
        function updateClock() {
            const now = new Date();
            document.getElementById('liveClock').textContent = 
                now.toLocaleTimeString('en-GB', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ==================== تغيير الألوان الديناميكية ====================
        function updateThemeColor(hue) {
            currentHue = hue;
            document.documentElement.style.setProperty('--primary-hue', hue);
            document.documentElement.style.setProperty('--neon', `hsl(${hue}, 100%, 50%)`);
            document.documentElement.style.setProperty('--neon-glow', `hsla(${hue}, 100%, 50%, 0.3)`);
            
            // تحديث خلفية النيبولا
            document.querySelector('.nebula-bg').style.background = 
                `radial-gradient(circle at 50% 50%, hsla(${hue}, 100%, 8%, 1) 0%, #000 100%)`;
        }

        // تغيير اللون مع كل فيديو جديد
        function cycleToNextColor() {
            const hues = [330, 180, 280, 45, 200, 0, 300];
            const nextHue = hues[Math.floor(Math.random() * hues.length)];
            updateThemeColor(nextHue);
        }

        // ==================== النافذة المنبثقة ====================
        function toggleModal() {
            const modal = document.getElementById('uploadModal');
            if (modal.style.display === 'flex') {
                modal.classList.remove('active');
                setTimeout(() => modal.style.display = 'none', 200);
            } else {
                modal.style.display = 'flex';
                setTimeout(() => modal.classList.add('active'), 10);
            }
        }

        // ==================== رفع الفيديو ====================
        function uploadVideo() {
            const input = document.getElementById('videoUrlInput');
            const url = input.value.trim();
            
            if (!url) {
                alert("⚠️ أدخل رابط الفيديو");
                return;
            }
            
            if (!url.startsWith('http')) {
                alert("⚠️ الرابط يجب أن يبدأ بـ http أو https");
                return;
            }
            
            if (!firebaseReady) {
                alert("❌ لا يوجد اتصال بقاعدة البيانات");
                return;
            }
            
            db.ref('videos/').push({ 
                url: url, 
                likes: 0, 
                timestamp: Date.now(),
                hue: currentHue // حفظ اللون مع الفيديو
            }).then(() => {
                input.value = '';
                toggleModal();
                cycleToNextColor(); // تغيير اللون بعد الرفع
            }).catch(err => {
                alert("❌ فشل الرفع: " + err.message);
            });
        }

        // ==================== عرض الفيديوهات ====================
        if (db) {
            db.ref('videos').on('value', (snap) => {
                const container = document.getElementById('videoStack');
                const data = snap.val();
                globalVideos = data;
                container.innerHTML = '';
                
                const count = data ? Object.keys(data).length : 0;
                document.getElementById('vidCounter').textContent = `${count} فيديو`;
                
                if (!data) {
                    container.innerHTML = `
                        <div class="video-segment flex items-center justify-center">
                            <div class="text-center opacity-40">
                                <i class="fas fa-film text-7xl mb-6" style="color: var(--neon);"></i>
                                <p class="font-[Orbitron] text-2xl tracking-widest mb-3">NO SIGNAL</p>
                                <p class="text-sm opacity-60">اضغط على ✦ للرفع</p>
                            </div>
                        </div>`;
                    return;
                }
                
                const fragment = document.createDocumentFragment();
                const videos = Object.entries(data).reverse();
                
                videos.forEach(([id, vid], index) => {
                    // تغيير اللون عند عرض الفيديو الأول (الأحدث)
                    if (index === 0 && vid.hue) {
                        updateThemeColor(vid.hue);
                    }
                    
                    const section = document.createElement('section');
                    section.className = 'video-segment';
                    section.dataset.videoId = id;
                    section.innerHTML = `
                        <div class="video-container">
                            <div class="cyber-mark">VØID_X // NEBULA</div>
                            <video loop playsinline muted data-src="${vid.url}"></video>
                            <div class="video-progress">
                                <div class="progress-fill" id="progress-${id}"></div>
                            </div>
                            <div class="action-cluster">
                                <div class="glass-action" onclick="toggleGlobalMute()">
                                    <i class="fas fa-volume-xmark mute-icon"></i>
                                    <span class="action-label">AUDIO</span>
                                </div>
                                <div class="glass-action" onclick="likeVideo('${id}')">
                                    <i class="fas fa-bolt"></i>
                                    <span class="action-label">LIKE</span>
                                    <span class="like-count" id="likes-${id}">${vid.likes || 0}</span>
                                </div>
                                <div class="glass-action" onclick="shareVideo()">
                                    <i class="fas fa-share-nodes"></i>
                                    <span class="action-label">SHARE</span>
                                </div>
                            </div>
                        </div>`;
                    fragment.appendChild(section);
                });
                
                container.appendChild(fragment);
                initializeVideoObserver();
                updateAllMuteIcons();
            });
        }

        // ==================== مراقب الفيديوهات (تشغيل/إيقاف مع التمرير) ====================
        function initializeVideoObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    const progressBar = entry.target.querySelector('.progress-fill');
                    
                    if (entry.isIntersecting) {
                        if (!video.src) {
                            video.src = video.dataset.src;
                        }
                        video.muted = isMuted;
                        video.play().catch(() => {});
                        
                        // تحديث شريط التقدم
                        video.addEventListener('timeupdate', () => {
                            if (progressBar && video.duration) {
                                const percent = (video.currentTime / video.duration) * 100;
                                progressBar.style.width = percent + '%';
                            }
                        });
                        
                        // تغيير اللون بناءً على الفيديو المعروض
                        const videoId = entry.target.dataset.videoId;
                        if (videoId && globalVideos && globalVideos[videoId]?.hue) {
                            updateThemeColor(globalVideos[videoId].hue);
                        }
                    } else {
                        video.pause();
                    }
                });
            }, { threshold: 0.7 });
            
            document.querySelectorAll('.video-segment').forEach(seg => observer.observe(seg));
        }

        // ==================== التحكم بالصوت ====================
        function toggleGlobalMute() {
            isMuted = !isMuted;
            document.querySelectorAll('video').forEach(v => v.muted = isMuted);
            updateAllMuteIcons();
        }

        function updateAllMuteIcons() {
            const icons = document.querySelectorAll('.mute-icon');
            icons.forEach(icon => {
                icon.className = isMuted ? 'fas fa-volume-xmark mute-icon' : 'fas fa-volume-high mute-icon';
            });
        }

        // ==================== الإعجاب ====================
        function likeVideo(id) {
            if (!firebaseReady) return;
            
            db.ref(`videos/${id}/likes`).transaction(likes => (likes || 0) + 1);
            
            // تأثير بصري
            const likeEl = document.getElementById(`likes-${id}`);
            if (likeEl) {
                likeEl.style.transform = 'scale(1.5)';
                setTimeout(() => likeEl.style.transform = 'scale(1)', 200);
            }
        }

        // ==================== مشاركة ====================
        function shareVideo() {
            if (navigator.share) {
                navigator.share({
                    title: 'VØID_X Video',
                    url: window.location.href
                });
            } else {
                alert('انسخ الرابط من المتصفح للمشاركة');
            }
        }

        // ==================== وظائف أخرى ====================
        function openAdmin() {
            const pass = prompt("Enter Access Code:");
            if (pass === "1234") {
                alert("✅ Admin Access Granted");
                // يمكنك إضافة لوحة التحكم هنا
            }
        }

        function toggleChat() {
            alert("💬 Chat system online soon...");
        }

        // ==================== طلب ملء الشاشة تلقائي ====================
        function requestFullscreen() {
            document.documentElement.requestFullscreen?.();
        }

        // تفعيل ملء الشاشة عند أول تفاعل
        document.addEventListener('click', () => {
            requestFullscreen();
        }, { once: true });

        // ==================== تأثيرات إضافية ====================
        console.log('%c🔥 VØID_X NEBULA EDGE // SYSTEM ONLINE', 'color: #ff007f; font-size: 16px; font-family: monospace;');
    </script>
</body>
