<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XRAWS | GREEN ZENITH PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Rajdhani:wght@500;700&display=swap');
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000b00; font-family: 'Rajdhani', sans-serif; color: white; }
        .glass-header { position: fixed; top: 0; width: 100%; z-index: 2000; display: flex; justify-content: space-between; align-items: center; padding: 20px 25px; background: rgba(0, 255, 127, 0.05); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(0, 255, 127, 0.1); }
        .brand-logo { font-family: 'Syncopate'; font-size: 22px; color: #00ff7f; text-shadow: 0 0 15px #00ff7f; letter-spacing: 4px; }
        .join-now { background: #00ff7f; color: #000b00; padding: 8px 20px; border-radius: 50px; font-weight: 900; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 0 20px rgba(0, 255, 127, 0.4); border: none; transition: 0.3s; }
        .main-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .main-feed::-webkit-scrollbar { display: none; }
        .video-card { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; background: #000; }
        video { height: 100%; width: 100%; object-fit: cover; }
        .side-actions { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; z-index: 100; }
        .action-circle { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); width: 55px; height: 55px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; cursor: pointer; }
        .action-circle i { font-size: 24px; color: #00ff7f; }
        .action-circle span { font-size: 10px; margin-top: 3px; font-weight: bold; color: #fff; }
        .video-details { position: absolute; left: 20px; bottom: 100px; right: 80px; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px); padding: 15px; border-radius: 15px; border-left: 4px solid #00ff7f; z-index: 100; }
        .bottom-navbar { position: fixed; bottom: 0; width: 100%; height: 70px; background: rgba(0, 5, 0, 0.9); border-top: 1px solid rgba(0, 255, 127, 0.2); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .upload-icon { background: white; color: black; width: 50px; height: 35px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 0 15px rgba(255,255,255,0.3); cursor: pointer; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; display: none; align-items: center; justify-content: center; }
        .auth-form { background: #0a110a; border: 1px solid #00ff7f; padding: 40px; border-radius: 25px; width: 90%; max-width: 380px; text-align: center; }
        input { width: 100%; background: #000; border: 1px solid #1a2e1a; padding: 15px; border-radius: 12px; margin-bottom: 12px; color: #00ff7f; outline: none; }
    </style>
</head>
<body>

    <header class="glass-header">
        <div class="brand-logo">XRAWS</div>
        <button class="join-now" id="auth-trigger" onclick="toggleModal()">JOIN NOW</button>
    </header>

    <div class="main-feed" id="video-stream"></div>

    <nav class="bottom-navbar">
        <i class="fas fa-home text-green-400 text-xl"></i>
        <div class="upload-icon" onclick="openUploader()"><i class="fas fa-plus"></i></div>
        <i class="fas fa-user text-gray-500 text-xl" onclick="toggleModal()"></i>
    </nav>

    <div class="modal" id="login-modal">
        <div class="auth-form">
            <h2 style="font-family:'Syncopate'" class="text-xl mb-8 text-green-400 uppercase">System Login</h2>
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="handleAuth()" class="w-full bg-green-500 py-4 rounded-xl font-bold text-black uppercase">Connect Now</button>
            <p onclick="toggleModal()" class="mt-6 text-xs text-gray-500 cursor-pointer underline">Return to Stream</p>
        </div>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyD93aEghXrgkTYRKnQ98rVe1Fu9NdngcxY",
            authDomain: "soko-7d03e.firebaseapp.com",
            databaseURL: "https://soko-7d03e-default-rtdb.firebaseio.com",
            projectId: "soko-7d03e",
            storageBucket: "soko-7d03e.firebasestorage.app",
            messagingSenderId: "636395398521",
            appId: "1:636395398521:web:fbd094bd35a2883fda3ba8"
        };

        const MY_ADMIN = "jasim300v@gmail.com";
        firebase.initializeApp(config);
        const db = firebase.database();
        const auth = firebase.auth();

        function toggleModal() {
            const m = document.getElementById('login-modal');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        async function handleAuth() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            try { await auth.signInWithEmailAndPassword(e, p); }
            catch { await auth.createUserWithEmailAndPassword(e, p); }
            toggleModal();
        }

        function handleAds(url) {
            window.open(url, '_blank');
        }

        const widget = cloudinary.createUploadWidget({
            cloudName: "dfscughol", uploadPreset: "update_vk"
        }, (err, res) => {
            if (res.event === "success") {
                db.ref('posts').push({
                    url: res.info.secure_url,
                    user: auth.currentUser ? auth.currentUser.email : "Guest_User",
                    likes: 0, time: Date.now()
                });
            }
        });

        function openUploader() { widget.open(); }

        auth.onAuthStateChanged(user => {
            const btn = document.getElementById('auth-trigger');
            if(user) {
                btn.innerText = (user.email === MY_ADMIN) ? "MASTER ADMIN" : user.email.split('@')[0].toUpperCase();
                btn.style.background = "#fff";
                btn.style.boxShadow = "0 0 20px #fff";
            }
        });

        db.ref('posts').on('value', snap => {
            const stream = document.getElementById('video-stream');
            stream.innerHTML = '';
            snap.forEach(child => {
                const p = child.val();
                const id = child.key;
                const isMe = auth.currentUser && auth.currentUser.email === MY_ADMIN;

                stream.innerHTML += `
                    <div class="video-card">
                        <video src="${p.url}" loop playsinline onclick="this.paused?this.play():this.pause()"></video>
                        <div class="side-actions">
                            <div class="action-circle" onclick="handleAds('https://www.effectivegatecpm.com/kuki6rvqm?key=a04d97f6be8bda0dd0a291285eb401bf'); db.ref('posts/${id}').update({likes:(p.likes||0)+1})">
                                <i class="fas fa-heart"></i>
                                <span>${p.likes||0}</span>
                            </div>
                            <div class="action-circle" onclick="handleAds('https://www.effectivegatecpm.com/k60w64w4gk?key=564f3d8cc4ac85949f218179b742495e')">
                                <i class="fas fa-comment"></i><span>99+</span>
                            </div>
                            <div class="action-circle" onclick="handleAds('https://www.effectivegatecpm.com/bxwxuk2f39?key=566216691dc8b76a740840e94f68f44c')">
                                <i class="fas fa-share"></i><span>SHARE</span>
                            </div>
                            ${isMe ? `<div class="action-circle border-white" onclick="db.ref('posts/${id}').remove()"><i class="fas fa-trash-alt text-white"></i></div>` : ''}
                        </div>
                        <div class="video-details">
                            <h3 class="text-green-400 font-bold">@${p.user.split('@')[0]}</h3>
                            <p class="text-xs opacity-70 mt-1">XRAWS GREEN STREAM // LIVE ACCESS</p>
                        </div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
