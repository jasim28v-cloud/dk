<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="referrer" content="no-referrer-when-downgrade" />
    
    <title>SHΔDØW | GENESIS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;700&display=swap');
        :root { --neon-color: #00f3ff; }
        
        /* التعديل الجوهري: التمرير المغناطيسي على مستوى الصفحة بالكامل */
        html, body { 
            margin: 0; padding: 0; 
            background: #000; 
            color: #fff; 
            font-family: 'Cairo', sans-serif;
            overflow-x: hidden;
            scroll-snap-type: y mandatory; /* تفعيل نمط تيك توك */
            scroll-behavior: smooth;
            height: 100%;
            overscroll-behavior-y: none; /* منع الارتداد الأبيض */
        }
        
        /* كل فيديو يأخذ الشاشة كاملة بدقة */
        .video-segment { 
            height: 100vh; 
            width: 100vw; 
            scroll-snap-align: start; 
            scroll-snap-stop: always;
            position: relative; 
            background: #000; 
            overflow: hidden;
        }
        
        video { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            position: absolute; top: 0; left: 0;
            z-index: 0;
        }

        .glass-ui { 
            background: rgba(0, 0, 0, 0.3) !important; 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.08) !important; 
        }

        .neon-border { border-color: var(--neon-color) !important; box-shadow: 0 0 10px var(--neon-color); }
        .neon-text { color: var(--neon-color) !important; text-shadow: 0 0 5px var(--neon-color); }
        
        header { 
            position: fixed; top: 0; width: 100%; z-index: 200;
            padding-top: env(safe-area-inset-top, 15px); 
        }

        .xp-bar-container { position: fixed; top: 75px; left: 20px; width: 120px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 10px; z-index: 150; }
        #xp-progress { height: 100%; width: 0%; background: var(--neon-color); border-radius: 10px; transition: 1s; }
        
        .side-controls { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 18px; z-index: 50; }
        .glass-btn { width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); }
        
        .video-info { position: absolute; bottom: 120px; right: 20px; text-align: right; pointer-events: none; z-index: 40; }
        .watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-family: 'Orbitron', sans-serif; font-size: 2.5rem; font-weight: 900; color: rgba(255, 255, 255, 0.05); pointer-events: none; z-index: 10; }
        
        nav { 
            position: fixed; bottom: 5px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px;
            margin-bottom: env(safe-area-inset-bottom, 10px); 
            z-index: 200;
        }

        .admin-panel { position: fixed; inset: 0; z-index: 500; background: #050505; display: none; flex-direction: column; padding: 20px; overflow-y: auto; }
        .admin-card { background: #111; border: 1px solid #222; padding: 10px; border-radius: 10px; display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <header class="glass-ui p-4 flex justify-between items-center border-b border-white/5">
        <div class="flex flex-col">
            <span id="user-level" class="text-[9px] font-[Orbitron] neon-text">LEVEL 1 [INITIATE]</span>
            <div class="xp-bar-container"><div id="xp-progress"></div></div>
        </div>
        <h1 class="text-xl font-black italic font-[Orbitron] tracking-tighter">SHΔDØW</h1>
        <i class="fas fa-user-shield text-sm opacity-30 cursor-pointer" onclick="checkAdminAuth()"></i>
    </header>

    <main id="video-stack"></main>

    <nav class="h-16 glass-ui rounded-2xl flex justify-around items-center">
        <i class="fas fa-home neon-text text-xl"></i>
        <i class="fas fa-comment-dots opacity-60" onclick="toggleChatWithAd()"></i>
        <div id="upload-trigger" class="w-12 h-12 bg-white text-black rounded-xl flex items-center justify-center shadow-lg"><i class="fas fa-plus"></i></div>
        <i class="fas fa-random opacity-60" onclick="shuffleProtocol()"></i>
    </nav>

    <div id="chat-overlay" class="fixed inset-0 z-[300] hidden flex-col glass-ui" style="background: rgba(0,0,0,0.92);">
        <div class="p-4 flex justify-between border-b border-white/10">
            <span class="neon-text font-[Orbitron]">ENCRYPTED_COMMS</span>
            <i class="fas fa-chevron-down p-2" onclick="toggleChat()"></i>
        </div>
        <div id="chat-box" class="flex-1 p-5 overflow-y-auto space-y-4"></div>
        <div class="p-4 flex gap-2 border-t border-white/10 bg-black/50">
            <input type="text" id="msg-input" class="flex-1 bg-white/5 border border-white/10 rounded-xl p-3 text-white text-sm outline-none" placeholder="Send secure message..." onkeypress="handleKey(event)">
            <button onclick="sendChat()" class="neon-text p-2"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="admin-overlay" class="admin-panel">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold neon-text">CONTROL_CENTER</h2>
            <button onclick="toggleAdmin()" class="bg-red-500/20 text-red-500 px-4 py-1 rounded">CLOSE</button>
        </div>
        <div id="admin-list"></div>
    </div>

    <script>
        const ADMIN_PASS = "1234";
        const SPECIAL_AD_LINK = "https://www.effectivegatecpm.com/bxwxuk2f39?key=566216691dc8b76a740840e94f68f44c";
        const USER_AD_LINK = "https://data527.click/21330bf1d025d41336e6/57154ac610/?placementName=default";
        
        let isGlobalMuted = true;
        const SHADOW_ID = localStorage.getItem('shadow_uid') || 'UX_' + Math.random().toString(36).substr(2, 6).toUpperCase();
        localStorage.setItem('shadow_uid', SHADOW_ID);
        let userXP = parseInt(localStorage.getItem('shadow_xp')) || 0;

        const firebaseConfig = { databaseURL: "https://xkom-a73e4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function triggerAd() { window.open(USER_AD_LINK, '_blank'); addXP(10); }
        function addXP(amount) { userXP += amount; localStorage.setItem('shadow_xp', userXP); updateXPUI(); }
        function updateXPUI() {
            const level = Math.floor(userXP / 500) + 1;
            const progress = (userXP % 500) / 5;
            document.getElementById('user-level').innerText = `LVL ${level} // OPERATIVE`;
            document.getElementById('xp-progress').style.width = progress + "%";
        }
        updateXPUI();

        db.ref('videos').on('value', (snapshot) => {
            const container = document.getElementById('video-stack');
            const data = snapshot.val();
            if(!data) return;
            container.innerHTML = '';
            Object.keys(data).reverse().forEach((id) => {
                const vid = data[id];
                const section = document.createElement('section');
                section.className = 'video-segment';
                section.innerHTML = `
                    <video loop playsinline muted src="${vid.url}" onclick="togglePlay(this)"></video>
                    <div class="watermark">SHΔDØW GENESIS</div>
                    <div class="video-info">
                        <div class="text-[10px] opacity-40">SOURCE: ${vid.sender || 'ANON'}</div>
                        <div class="text-xs font-bold neon-text">PROTOCOL_${id.substr(-4)}</div>
                    </div>
                    <div class="side-controls">
                        <div class="glass-btn glass-ui" onclick="toggleVolume(this)"><i class="fas fa-volume-mute text-red-500 vol-icon"></i></div>
                        <div class="glass-btn glass-ui" onclick="toggleLike('${id}')"><i class="fas fa-heart"></i><span class="text-[10px]">${vid.likes || 0}</span></div>
                    </div>
                `;
                container.appendChild(section);
            });
            initScroll();
        });

        // تشغيل الفيديوهات وحيلة إخفاء شريط العنوان
        function initScroll() {
            const obs = new IntersectionObserver((entries) => {
                entries.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting && v) {
                        v.play().catch(()=>{});
                        // الحيلة: التمرير بمقدار 1 بكسل لإخفاء شريط العنوان تلقائياً
                        if(window.scrollY === 0) window.scrollTo(0, 1);
                    } else if(v) { v.pause(); v.currentTime = 0; }
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.video-segment').forEach(s => obs.observe(s));
        }

        // إخفاء الشريط عند التحميل وعند أول لمسة
        window.addEventListener("load", () => { setTimeout(() => window.scrollTo(0, 1), 500); });
        document.addEventListener('touchstart', () => { 
            if(window.scrollY === 0) window.scrollTo(0, 1);
            document.querySelectorAll('video').forEach(v => v.muted = isGlobalMuted);
        }, { once: true });

        function togglePlay(v) { (v.paused) ? v.play() : v.pause(); }
        function toggleVolume(btn) {
            window.open(SPECIAL_AD_LINK, '_blank');
            isGlobalMuted = !isGlobalMuted;
            document.querySelectorAll('video').forEach(v => v.muted = isGlobalMuted);
            document.querySelectorAll('.vol-icon').forEach(i => i.className = isGlobalMuted ? 'fas fa-volume-mute text-red-500' : 'fas fa-volume-up neon-text');
        }
        function toggleLike(id) { triggerAd(); db.ref(`videos/${id}/likes`).transaction(l => (l || 0) + 1); }

        function shuffleProtocol() {
            const s = document.querySelectorAll('.video-segment');
            if(s.length) s[Math.floor(Math.random()*s.length)].scrollIntoView({behavior:'smooth'});
        }

        const myWidget = cloudinary.createUploadWidget({ cloudName: "dqzjfaqg4", uploadPreset: "vox_god" }, (err, res) => {
            if (!err && res.event === "success") db.ref('videos/').push({ url: res.info.secure_url, sender: SHADOW_ID, likes: 0, timestamp: Date.now() });
        });
        document.getElementById("upload-trigger").onclick = () => myWidget.open();

        function toggleChat() { document.getElementById('chat-overlay').classList.toggle('hidden'); document.getElementById('chat-overlay').classList.toggle('flex'); }
        function toggleChatWithAd() { triggerAd(); toggleChat(); }
        function sendChat() { 
            const i = document.getElementById('msg-input');
            if(i.value.trim()){ db.ref('global_chat').push({user:SHADOW_ID, text:i.value, time: Date.now()}); i.value=''; } 
        }
        function handleKey(e) { if(e.key==='Enter') sendChat(); }
        db.ref('global_chat').limitToLast(20).on('value', s => {
            const b = document.getElementById('chat-box'); b.innerHTML = '';
            const v = s.val(); if(v) Object.values(v).forEach(m => {
                const d = document.createElement('div');
                d.className = `max-w-[80%] p-3 rounded-2xl border ${m.user === SHADOW_ID ? 'mr-auto bg-[#00f3ff]/10 border-[#00f3ff]/30' : 'ml-auto bg-white/5 border-white/10'}`;
                d.innerHTML = `<span class="text-[8px] opacity-50 block mb-1">${m.user}</span><p class="text-sm">${m.text}</p>`;
                b.appendChild(d);
            }); b.scrollTop = b.scrollHeight;
        });

        function checkAdminAuth() { if(prompt("KEY:") === ADMIN_PASS) toggleAdmin(); }
        function toggleAdmin() { const a = document.getElementById('admin-overlay'); a.style.display = a.style.display === 'flex' ? 'none' : 'flex'; }
    </script>
</body>
</html>
