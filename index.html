<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITAN VIDEO | يوتيوب تيتان</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Cairo:wght@400;700&display=swap');
        body { background-color: #0f0f0f; color: white; font-family: 'Roboto', 'Cairo', sans-serif; margin: 0; }
        
        /* الهيدر العلوي مثل يوتيوب */
        header { 
            position: fixed; top: 0; left: 0; right: 0; height: 56px; 
            background: #0f0f0f; display: flex; align-items: center; 
            justify-content: space-between; padding: 0 16px; z-index: 1000;
        }
        .logo { display: flex; align-items: center; gap: 4px; font-weight: bold; font-size: 20px; color: #fff; }
        .logo i { color: #ff0000; font-size: 24px; }

        /* زر الرفع العلوي (بدون إعلان) */
        .upload-action-btn {
            background: #272727; border-radius: 20px; padding: 6px 12px;
            display: flex; align-items: center; gap: 8px; cursor: pointer; transition: 0.2s;
        }
        .upload-action-btn:hover { background: #3f3f3f; }

        /* تخطيط الصفحة */
        main { margin-top: 70px; padding: 16px; }
        .yt-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 16px; row-gap: 32px;
        }

        /* كرت الفيديو اليوتيوبي */
        .video-item { cursor: pointer; width: 100%; }
        .thumbnail-container { 
            position: relative; width: 100%; aspect-ratio: 16/9; 
            background: #222; border-radius: 12px; overflow: hidden; margin-bottom: 12px;
        }
        .thumbnail-container video { width: 100%; height: 100%; object-fit: cover; }
        
        .video-details { display: flex; gap: 12px; }
        .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: #444; flex-shrink: 0; }
        .video-info h3 { font-size: 16px; margin: 0 0 4px 0; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .video-meta { font-size: 14px; color: #aaa; }

        /* علامة التحميل */
        .loading-overlay { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); 
            z-index: 2000; align-items: center; justify-content: center; flex-direction: column; 
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #fff; border-top-color: #ff0000; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <i class="fab fa-youtube"></i>
            <span>TITAN</span>
        </div>
        
        <div class="upload-action-btn" id="yt-upload-trigger">
            <i class="fas fa-plus"></i>
            <span>إنشاء فيديو</span>
        </div>
    </header>

    <div class="loading-overlay" id="global-loader">
        <div class="spinner"></div>
        <p class="mt-4 font-bold">جاري رفع الفيديو إلى الأرشيف...</p>
    </div>

    <main>
        <div class="yt-grid" id="youtube-list">
            </div>
    </main>

    <script>
        // إعداداتك الخاصة (Firebase & Cloudinary)
        const firebaseConfig = { databaseURL: "https://goodd-eb2fa-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const CLOUD_NAME = "dssk5tabb"; 
        const UPLOAD_PRESET = "Titan_preset";

        // روابط الإعلانات
        const AD_LINKS = [
            "https://www.effectivegatecpm.com/k60w64w4gk?key=564f3d8cc4ac85949f218179b742495e",
            "https://www.effectivegatecpm.com/bxwxuk2f39?key=566216691dc8b76a740840e94f68f44c"
        ];
        let adToggle = 0;
        function openAd() {
            window.open(AD_LINKS[adToggle], '_blank');
            adToggle = (adToggle + 1) % AD_LINKS.length;
        }

        // نظام الرفع (بدون إعلان)
        const loader = document.getElementById('global-loader');
        const myWidget = cloudinary.createUploadWidget({ 
            cloudName: CLOUD_NAME, 
            uploadPreset: UPLOAD_PRESET 
        }, (err, res) => {
            if (res.event === "start") { loader.style.display = 'flex'; }
            if (!err && res.event === "success") {
                db.ref('yt_vault/').push({ 
                    url: res.info.secure_url, 
                    title: "فيديو تيتان الجديد #" + Math.floor(Math.random()*1000),
                    timestamp: Date.now() 
                });
                loader.style.display = 'none';
            }
        });

        // زر الرفع لا يفتح إعلان بناءً على طلبك
        document.getElementById("yt-upload-trigger").onclick = () => { myWidget.open(); };

        // جلب الفيديوهات بتنسيق يوتيوب
        db.ref('yt_vault').on('value', (snapshot) => {
            const list = document.getElementById('youtube-list');
            const data = snapshot.val();
            if(!data) return;
            list.innerHTML = '';
            Object.keys(data).reverse().forEach(id => {
                const vid = data[id];
                const item = document.createElement('div');
                item.className = 'video-item';
                // الضغط لمشاهدة الفيديو يفتح الإعلان أولاً
                item.onclick = () => { openAd(); }; 
                item.innerHTML = `
                    <div class="thumbnail-container">
                        <video src="${vid.url}" muted onmouseover="this.play()" onmouseout="this.pause(); this.currentTime=0"></video>
                    </div>
                    <div class="video-details">
                        <div class="user-avatar"></div>
                        <div class="video-info">
                            <h3>${vid.title}</h3>
                            <p class="video-meta">قناة تيتان • منذ قليل</p>
                        </div>
                    </div>
                `;
                list.appendChild(item);
            });
        });
    </script>
</body>
</html>
